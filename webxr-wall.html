<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>WebXR Wall Detection</title>

  <link rel="stylesheet" href="./style.css" />

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #05070b;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
    }

    #xrCanvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: transparent;
    }

    .webxr-actions {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: calc(16px + env(safe-area-inset-bottom, 0));
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      padding: 8px;
      border-radius: 999px;
      background: rgba(0, 0, 0, .52);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .webxr-actions button {
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 999px;
      padding: 11px 14px;
      background: rgba(255, 255, 255, .1);
      color: white;
      font-weight: 800;
      font-size: 12px;
    }

    .webxr-actions .primary {
      background: #00e7ff;
      color: #001014;
      border-color: transparent;
    }

    .webxr-actions button:disabled {
      opacity: .5;
    }

    .fallback-link {
      position: fixed;
      z-index: 30;
      right: 12px;
      top: calc(72px + env(safe-area-inset-top, 0));
      border: 0;
      border-radius: 999px;
      padding: 10px 13px;
      background: rgba(0, 0, 0, .5);
      color: white;
      font-weight: 700;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .webxr-crosshair {
      position: fixed;
      z-index: 20;
      left: 50%;
      top: 50%;
      width: 42px;
      height: 42px;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(0, 231, 255, .95);
      border-radius: 999px;
      box-shadow: 0 0 0 8px rgba(0, 231, 255, .08);
      pointer-events: none;
    }

    .webxr-crosshair::before,
    .webxr-crosshair::after {
      content: "";
      position: absolute;
      background: rgba(0, 231, 255, .9);
    }

    .webxr-crosshair::before {
      left: 50%;
      top: 8px;
      bottom: 8px;
      width: 1px;
      transform: translateX(-50%);
    }

    .webxr-crosshair::after {
      top: 50%;
      left: 8px;
      right: 8px;
      height: 1px;
      transform: translateY(-50%);
    }

    .webxr-log {
      position: fixed;
      z-index: 26;
      left: 12px;
      right: 12px;
      bottom: calc(90px + env(safe-area-inset-bottom, 0));
      padding: 9px 11px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, .12);
      background: rgba(0, 0, 0, .42);
      color: rgba(255, 255, 255, .76);
      font-size: 11px;
      line-height: 1.45;
      pointer-events: none;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    @media (max-height: 690px) {
      .webxr-log {
        display: none;
      }
    }
  </style>

  <script src="./products.js"></script>
  <script type="module" src="./webxr-wall.js"></script>
</head>
<body>
  <canvas id="xrCanvas"></canvas>

  <div id="hud" class="hud">
    <div class="brand">Android WebXR Wall Detection</div>
    <div id="status" class="status">WebXR 준비 중...</div>
  </div>

  <button id="manualFallback" class="fallback-link">수동 모드</button>

  <div id="notice" class="notice">
    <b>Android Chrome 실험 모드</b><br />
    실제 vertical plane detection을 먼저 시도합니다.<br />
    벽면 감지가 실패하면 8th Wall fallback 수동 배치 모드로 전환합니다.
  </div>

  <div class="webxr-crosshair" aria-hidden="true"></div>

  <div id="webxrLog" class="webxr-log">
    카메라를 벽 쪽으로 향하게 하고 천천히 좌우로 움직이세요.
  </div>

  <div class="webxr-actions">
    <button id="startWebXR" class="primary">벽 감지 시작</button>
    <button id="placeManual" disabled>중앙에 배치</button>
  </div>
</body>
</html>
