<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>벽면 거리 측정 MVP</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    #camera-preview {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      z-index: 1;
      background: #111;
    }

    #overlay {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 5;
      pointer-events: none;
    }

    #top-panel {
      position: fixed;
      top: env(safe-area-inset-top, 0);
      left: 0;
      right: 0;
      z-index: 20;
      padding: 10px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.78), rgba(0,0,0,0));
      pointer-events: none;
    }

    #step-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    #guide-text {
      font-size: 13px;
      line-height: 1.35;
      opacity: 0.95;
      max-width: 94vw;
    }

    #bottom-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 30;
      padding: 10px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0));
      background: rgba(0,0,0,0.76);
      backdrop-filter: blur(8px);
    }

    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      align-items: stretch;
    }

    .row:last-child {
      margin-bottom: 0;
    }

    label {
      flex: 1;
      font-size: 12px;
      color: rgba(255,255,255,0.82);
    }

    input {
      width: 100%;
      margin-top: 4px;
      padding: 8px;
      font-size: 16px;
      color: #fff;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 8px;
    }

    button {
      flex: 1;
      padding: 12px 10px;
      border: 0;
      border-radius: 9px;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      background: #007aff;
    }

    button.secondary {
      background: #374151;
    }

    button.danger {
      background: #991b1b;
    }

    button:active {
      transform: scale(0.98);
    }

    #result {
      padding: 9px;
      border-radius: 9px;
      background: rgba(255,255,255,0.11);
      font-size: 14px;
      line-height: 1.45;
    }

    #debug {
      margin-top: 6px;
      font-size: 11px;
      line-height: 1.35;
      color: rgba(255,255,255,0.72);
      word-break: break-all;
    }

    .notice {
      color: #fde68a;
    }
  </style>
</head>

<body>
  <div id="app">
    <video id="camera-preview" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>

    <div id="top-panel">
      <div id="step-title">준비</div>
      <div id="guide-text">
        시작 버튼을 누른 뒤, 휴대폰을 눈높이에 들고 벽면의 이미지 배치 지점을 중앙 기준점에 맞추세요.
      </div>
    </div>

    <div id="bottom-panel">
      <div class="row">
        <label>
          내 키(cm)
          <input id="user-height" type="number" value="170" min="120" max="220" step="1" />
        </label>

        <label>
          추정 카메라 높이
          <input id="camera-height" type="text" value="156cm" readonly />
        </label>

        <label>
          세로 화각
          <input id="fov" type="number" value="60" min="35" max="90" step="1" />
        </label>
      </div>

      <div class="row">
        <button id="action-btn">시작</button>
      </div>

      <div class="row">
        <button id="flip-btn" class="secondary">각도 방향 반전</button>
        <button id="reset-btn" class="danger">초기화</button>
      </div>

      <div id="result">
        결과: -
      </div>

      <div id="debug">
        sensor: 대기중
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById("camera-preview");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");

    const stepTitle = document.getElementById("step-title");
    const guideText = document.getElementById("guide-text");
    const resultEl = document.getElementById("result");
    const debugEl = document.getElementById("debug");

    const userHeightInput = document.getElementById("user-height");
    const cameraHeightInput = document.getElementById("camera-height");
    const fovInput = document.getElementById("fov");

    const actionBtn = document.getElementById("action-btn");
    const flipBtn = document.getElementById("flip-btn");
    const resetBtn = document.getElementById("reset-btn");

    const RAD = Math.PI / 180;
    const DEG = 180 / Math.PI;

    let cameraStarted = false;
    let sensorStarted = false;

    let orientationCount = 0;
    let currentPitch = null;
    let currentBeta = null;
    let currentGamma = null;

    let angleSign = 1;

    /*
      step:
      ready       : 시작 전
      imagePoint  : 벽면 이미지 배치 지점 확정
      wallFloor   : 벽/바닥선 확정
      toe         : 발끝 확정
      done        : 완료
    */
    let step = "ready";

    let imagePoint = null;
    let wallFloorPoint = null;
    let toePoint = null;

    let wallDistanceCm = null;
    let toeDistanceCm = null;
    let finalDistanceCm = null;
    let imageCenterHeightCm = null;

    function updateCameraHeightEstimate() {
      const userHeight = parseFloat(userHeightInput.value) || 170;

      // MVP 추정값: 사용자가 휴대폰을 눈높이 근처에 들고 있다고 가정
      const estimatedCameraHeight = userHeight * 0.92;

      cameraHeightInput.value = Math.round(estimatedCameraHeight) + "cm";

      return estimatedCameraHeight;
    }

    function getCameraHeightCm() {
      return updateCameraHeightEstimate();
    }

    userHeightInput.addEventListener("input", () => {
      updateCameraHeightEstimate();
      recompute();
    });

    fovInput.addEventListener("input", () => {
      draw();
    });

    updateCameraHeightEstimate();

    function setStep(title, text, buttonText) {
      stepTitle.textContent = title;
      guideText.textContent = text;
      actionBtn.textContent = buttonText;
    }

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;

      canvas.width = Math.round(window.innerWidth * dpr);
      canvas.height = Math.round(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    window.addEventListener("resize", resizeCanvas);
    window.addEventListener("orientationchange", () => {
      setTimeout(resizeCanvas, 250);
    });

    resizeCanvas();

    async function startApp() {
      try {
        await requestSensorPermission();
        await startCamera();

        step = "imagePoint";

        setStep(
          "1단계: 이미지 배치 지점",
          "휴대폰을 눈높이에 들고, 벽면에서 이미지를 배치할 중심 지점을 중앙 기준점에 맞춘 뒤 확정하세요.",
          "이미지 위치 확정"
        );

        resultEl.innerHTML =
          '<span class="notice">측정 중에는 발 위치와 휴대폰 위치를 최대한 고정하고, 각도만 천천히 바꿔주세요.</span>';
      } catch (err) {
        resultEl.textContent = "시작 실패: " + err.message;
      }
    }

    async function requestSensorPermission() {
      if (sensorStarted) return;

      if (
        typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function"
      ) {
        const result = await DeviceOrientationEvent.requestPermission();

        if (result !== "granted") {
          throw new Error("센서 권한이 거부되었습니다.");
        }
      }

      window.addEventListener("deviceorientation", handleOrientation, true);
      sensorStarted = true;
    }

    async function startCamera() {
      if (cameraStarted) return;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("이 브라우저에서 카메라 API를 사용할 수 없습니다.");
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "environment" },
          width: { ideal: 1280 },
          height: { ideal: 720 }
        },
        audio: false
      });

      video.srcObject = stream;
      await video.play();

      cameraStarted = true;
    }

    function handleOrientation(event) {
      orientationCount++;

      if (typeof event.beta === "number") {
        currentPitch = event.beta;
        currentBeta = event.beta;
      }

      if (typeof event.gamma === "number") {
        currentGamma = event.gamma;
      }
    }

    function angleDiffDeg(a, b) {
      return ((a - b + 540) % 360) - 180;
    }

    /*
      fromPitch에서 targetPitch까지 내려다보는 각도.
      기기마다 방향이 반대일 수 있어서 angleSign으로 보정.
    */
    function signedDownAngleDeg(fromPitch, targetPitch) {
      if (fromPitch === null || targetPitch === null) return null;
      return angleSign * angleDiffDeg(fromPitch, targetPitch);
    }

    function absDownAngleDeg(fromPitch, targetPitch) {
      const a = signedDownAngleDeg(fromPitch, targetPitch);
      if (a === null) return null;
      return Math.abs(a);
    }

    function distanceToGroundFromReference(targetPitch) {
      if (!imagePoint) {
        return {
          ok: false,
          message: "이미지 배치 지점 기준이 없습니다."
        };
      }

      const cameraHeight = getCameraHeightCm();

      // 이미지 배치 지점은 카메라 눈높이와 같은 수평 기준이라고 가정
      const downAngle = absDownAngleDeg(imagePoint.pitch, targetPitch);

      if (downAngle === null) {
        return {
          ok: false,
          message: "센서값이 없습니다."
        };
      }

      if (downAngle < 2) {
        return {
          ok: false,
          message: "아래각이 너무 작습니다. 바닥 쪽을 더 조준하세요."
        };
      }

      if (downAngle > 88) {
        return {
          ok: false,
          message: "아래각이 너무 큽니다. 조준 위치를 다시 확인하세요."
        };
      }

      const distance = cameraHeight / Math.tan(downAngle * RAD);

      return {
        ok: true,
        distance,
        downAngle
      };
    }

    function estimateWallImageHeight() {
      if (!imagePoint || !wallFloorPoint || wallDistanceCm === null) {
        imageCenterHeightCm = null;
        return;
      }

      // 현재 모델에서는 이미지 배치 지점이 카메라 높이와 같은 수평점이라는 전제
      imageCenterHeightCm = getCameraHeightCm();
    }

    function confirmCurrentStep() {
      if (step === "ready") {
        startApp();
        return;
      }

      if (currentPitch === null) {
        resultEl.textContent = "센서값이 아직 없습니다. 휴대폰을 살짝 움직인 뒤 다시 눌러주세요.";
        return;
      }

      if (step === "imagePoint") {
        imagePoint = {
          pitch: currentPitch,
          label: "이미지 위치"
        };

        wallFloorPoint = null;
        toePoint = null;
        wallDistanceCm = null;
        toeDistanceCm = null;
        finalDistanceCm = null;

        step = "wallFloor";

        setStep(
          "2단계: 벽/바닥선",
          "이미지 지점에서 줄자가 내려간다고 생각하고, 벽면과 바닥이 만나는 지점을 중앙 기준점에 맞춘 뒤 확정하세요.",
          "벽/바닥선 확정"
        );

        resultEl.innerHTML =
          "이미지 배치 지점 저장됨.<br>이제 벽과 바닥이 만나는 지점을 조준하세요.";

        draw();
        return;
      }

      if (step === "wallFloor") {
        const estimate = distanceToGroundFromReference(currentPitch);

        if (!estimate.ok) {
          resultEl.textContent = estimate.message;
          return;
        }

        wallFloorPoint = {
          pitch: currentPitch,
          label: "벽/바닥선",
          distanceCm: estimate.distance,
          downAngle: estimate.downAngle
        };

        wallDistanceCm = estimate.distance;

        step = "toe";

        setStep(
          "3단계: 발끝",
          "벽/바닥선에서 줄자가 바닥 위로 늘어난다고 생각하고, 발끝 지점을 중앙 기준점에 맞춘 뒤 확정하세요.",
          "발끝 확정"
        );

        resultEl.innerHTML =
          `벽/바닥선까지 거리: <strong>${Math.round(wallDistanceCm)}cm</strong><br>` +
          `아래각: ${wallFloorPoint.downAngle.toFixed(1)}°`;

        draw();
        return;
      }

      if (step === "toe") {
        const estimate = distanceToGroundFromReference(currentPitch);

        if (!estimate.ok) {
          resultEl.textContent = estimate.message;
          return;
        }

        toePoint = {
          pitch: currentPitch,
          label: "발끝",
          distanceCm: estimate.distance,
          downAngle: estimate.downAngle
        };

        toeDistanceCm = estimate.distance;
        finalDistanceCm = Math.abs(wallDistanceCm - toeDistanceCm);

        estimateWallImageHeight();

        step = "done";

        setStep(
          "측정 완료",
          "결과를 확인하세요. 다시 측정하려면 초기화를 누르세요.",
          "다시 확인"
        );

        resultEl.innerHTML = `
          벽/바닥선까지: <strong>${Math.round(wallDistanceCm)}cm</strong><br>
          발끝까지: <strong>${Math.round(toeDistanceCm)}cm</strong><br>
          <span style="font-size:1.2em;color:#ffe600;">
            ★ 벽 ↔ 발끝 거리: ${Math.round(finalDistanceCm)}cm
          </span><br>
          이미지 중심 높이 추정: ${imageCenterHeightCm ? Math.round(imageCenterHeightCm) + "cm" : "-"}
        `;

        draw();
        return;
      }

      if (step === "done") {
        resultEl.innerHTML = `
          벽/바닥선까지: <strong>${Math.round(wallDistanceCm)}cm</strong><br>
          발끝까지: <strong>${Math.round(toeDistanceCm)}cm</strong><br>
          <span style="font-size:1.2em;color:#ffe600;">
            ★ 벽 ↔ 발끝 거리: ${Math.round(finalDistanceCm)}cm
          </span>
        `;
      }
    }

    function recompute() {
      if (!imagePoint || !wallFloorPoint || !toePoint) return;

      const wall = distanceToGroundFromReference(wallFloorPoint.pitch);
      const toe = distanceToGroundFromReference(toePoint.pitch);

      if (!wall.ok || !toe.ok) return;

      wallDistanceCm = wall.distance;
      toeDistanceCm = toe.distance;
      finalDistanceCm = Math.abs(wallDistanceCm - toeDistanceCm);
      estimateWallImageHeight();

      resultEl.innerHTML = `
        벽/바닥선까지: <strong>${Math.round(wallDistanceCm)}cm</strong><br>
        발끝까지: <strong>${Math.round(toeDistanceCm)}cm</strong><br>
        <span style="font-size:1.2em;color:#ffe600;">
          ★ 벽 ↔ 발끝 거리: ${Math.round(finalDistanceCm)}cm
        </span><br>
        이미지 중심 높이 추정: ${imageCenterHeightCm ? Math.round(imageCenterHeightCm) + "cm" : "-"}
      `;

      draw();
    }

    function resetAll() {
      step = "imagePoint";

      imagePoint = null;
      wallFloorPoint = null;
      toePoint = null;

      wallDistanceCm = null;
      toeDistanceCm = null;
      finalDistanceCm = null;
      imageCenterHeightCm = null;

      setStep(
        "1단계: 이미지 배치 지점",
        "휴대폰을 눈높이에 들고, 벽면에서 이미지를 배치할 중심 지점을 중앙 기준점에 맞춘 뒤 확정하세요.",
        "이미지 위치 확정"
      );

      resultEl.innerHTML =
        '<span class="notice">초기화됨. 이미지 배치 지점부터 다시 확정하세요.</span>';

      draw();
    }

    function flipDirection() {
      angleSign *= -1;
      recompute();

      resultEl.innerHTML += `<br><span class="notice">각도 방향: ${angleSign === 1 ? "기본" : "반전"}</span>`;
      draw();
    }

    actionBtn.addEventListener("click", confirmCurrentStep);
    resetBtn.addEventListener("click", resetAll);
    flipBtn.addEventListener("click", flipDirection);

    function projectPitchToScreenY(targetPitch) {
      if (currentPitch === null || targetPitch === null) return null;

      const h = window.innerHeight;
      const verticalFov = (parseFloat(fovInput.value) || 60) * RAD;

      const deltaDeg = signedDownAngleDeg(currentPitch, targetPitch);

      if (deltaDeg === null) return null;

      const offsetY = Math.tan(deltaDeg * RAD) / Math.tan(verticalFov / 2) * (h / 2);

      return h / 2 + offsetY;
    }

    function drawCrosshair() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const cx = w / 2;
      const cy = h / 2;

      let color = "#00ff66";
      let label = "중앙 기준점";

      if (step === "imagePoint") {
        color = "#00ff66";
        label = "이미지 위치";
      } else if (step === "wallFloor") {
        color = "#00d4ff";
        label = "벽/바닥선";
      } else if (step === "toe") {
        color = "#ffe600";
        label = "발끝";
      } else if (step === "done") {
        color = "#ffffff";
        label = "측정 완료";
      }

      ctx.save();

      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;

      // 긴 수평선
      ctx.beginPath();
      ctx.moveTo(w * 0.12, cy);
      ctx.lineTo(w * 0.88, cy);
      ctx.stroke();

      // 짧은 수직선
      ctx.beginPath();
      ctx.moveTo(cx, cy - 70);
      ctx.lineTo(cx, cy + 70);
      ctx.stroke();

      // 중앙 원
      ctx.beginPath();
      ctx.arc(cx, cy, 25, 0, Math.PI * 2);
      ctx.stroke();

      // 중앙 점
      ctx.beginPath();
      ctx.arc(cx, cy, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.font = "bold 14px system-ui";
      ctx.textAlign = "center";

      const textY = cy + 45;
      const metrics = ctx.measureText(label);
      const boxW = metrics.width + 20;
      const boxH = 28;

      ctx.fillStyle = "rgba(0,0,0,0.75)";
      roundRect(ctx, cx - boxW / 2, textY - 18, boxW, boxH, 14);
      ctx.fill();

      ctx.fillStyle = color;
      ctx.fillText(label, cx, textY);

      ctx.restore();
    }

    function drawStoredPoint(point, color) {
      if (!point || currentPitch === null) return;

      const w = window.innerWidth;
      const cx = w / 2;
      const y = projectPitchToScreenY(point.pitch);

      if (y === null) return;

      ctx.save();

      const visible = y > -80 && y < window.innerHeight + 80;

      ctx.globalAlpha = visible ? 1 : 0.35;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;

      ctx.beginPath();
      ctx.arc(cx, y, 10, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.font = "bold 13px system-ui";
      ctx.textAlign = "left";
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "rgba(0,0,0,0.85)";
      ctx.lineWidth = 4;

      const label = point.distanceCm
        ? `${point.label} ${Math.round(point.distanceCm)}cm`
        : point.label;

      ctx.strokeText(label, cx + 16, y + 5);
      ctx.fillText(label, cx + 16, y + 5);

      ctx.restore();
    }

    function drawTapeLine(fromPoint, toPitch, color, labelText) {
      if (!fromPoint || currentPitch === null || toPitch === null) return;

      const cx = window.innerWidth / 2;
      const y1 = projectPitchToScreenY(fromPoint.pitch);
      const y2 = projectPitchToScreenY(toPitch);

      if (y1 === null || y2 === null) return;

      ctx.save();

      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 5;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;

      ctx.beginPath();
      ctx.moveTo(cx, y1);
      ctx.lineTo(cx, y2);
      ctx.stroke();

      // 줄자 눈금
      ctx.shadowBlur = 0;
      const startY = Math.min(y1, y2);
      const endY = Math.max(y1, y2);
      const tickCount = 8;

      ctx.lineWidth = 2;

      for (let i = 0; i <= tickCount; i++) {
        const t = i / tickCount;
        const y = startY + (endY - startY) * t;
        const tickLen = i % 2 === 0 ? 28 : 18;

        ctx.beginPath();
        ctx.moveTo(cx - tickLen / 2, y);
        ctx.lineTo(cx + tickLen / 2, y);
        ctx.stroke();
      }

      if (labelText) {
        const midY = (y1 + y2) / 2;

        ctx.font = "bold 15px system-ui";
        ctx.textAlign = "center";

        const metrics = ctx.measureText(labelText);
        const boxW = metrics.width + 20;
        const boxH = 30;

        ctx.fillStyle = "rgba(0,0,0,0.78)";
        roundRect(ctx, cx - boxW / 2, midY - boxH / 2, boxW, boxH, 10);
        ctx.fill();

        ctx.fillStyle = color;
        ctx.fillText(labelText, cx, midY + 5);
      }

      ctx.restore();
    }

    function drawTape() {
      const centerPitch = currentPitch;

      if (step === "wallFloor" && imagePoint && centerPitch !== null) {
        drawTapeLine(imagePoint, centerPitch, "#00d4ff", "벽 아래로 측정");
      }

      if (step === "toe" && wallFloorPoint && centerPitch !== null) {
        drawTapeLine(wallFloorPoint, centerPitch, "#ffe600", "발끝까지 측정");
      }

      if (step === "done") {
        if (imagePoint && wallFloorPoint) {
          drawTapeLine(imagePoint, wallFloorPoint.pitch, "#00d4ff", "벽 높이 방향");
        }

        if (wallFloorPoint && toePoint) {
          drawTapeLine(wallFloorPoint, toePoint.pitch, "#ffe600", `${Math.round(finalDistanceCm)}cm`);
        }
      }
    }

    function drawDebugText() {
      debugEl.innerHTML = `
        step: ${step} /
        sensor: ${sensorStarted ? "on" : "off"} /
        camera: ${cameraStarted ? "on" : "off"} /
        events: ${orientationCount}<br>
        beta: ${currentBeta !== null ? currentBeta.toFixed(1) : "-"} /
        gamma: ${currentGamma !== null ? currentGamma.toFixed(1) : "-"} /
        sign: ${angleSign}<br>
        imagePitch: ${imagePoint ? imagePoint.pitch.toFixed(1) : "-"} /
        wallPitch: ${wallFloorPoint ? wallFloorPoint.pitch.toFixed(1) : "-"} /
        toePitch: ${toePoint ? toePoint.pitch.toFixed(1) : "-"}
      `;
    }

    function draw() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      drawTape();

      drawStoredPoint(imagePoint, "#00ff66");
      drawStoredPoint(wallFloorPoint, "#00d4ff");
      drawStoredPoint(toePoint, "#ffe600");

      drawCrosshair();
    }

    function roundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);

      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function loop() {
      draw();
      drawDebugText();
      requestAnimationFrame(loop);
    }

    loop();

    if (!window.isSecureContext) {
      resultEl.innerHTML =
        '<span class="notice">주의: 카메라/센서 테스트는 HTTPS 환경에서 해야 합니다. GitHub Pages에서 테스트하세요.</span>';
    }
  </script>
