<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>AR로 벽에 걸어보기</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #top-panel {
            padding: 20px;
            padding-top: calc(10px + env(safe-area-inset-top, 0));
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0));
        }

        #top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        #step-title {
            font-size: 18px;
            font-weight: 800;
            color: #00ff66;
            margin-bottom: 5px;
        }

        #product-name {
            max-width: 72vw;
            margin-top: 4px;
            font-size: 12px;
            line-height: 1.4;
            opacity: 0.8;
            word-break: keep-all;
        }

        .ar-product-artist {
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.75;
            font-weight: 500;
        }

        .ar-product-title {
            margin-top: 2px;
            font-size: 14px;
            line-height: 1.35;
            opacity: 0.95;
            font-weight: 800;
        }

        .ar-product-size {
            margin-top: 4px;
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.7;
            font-weight: 600;
        }

        #guide-text {
            max-width: min(76vw, 520px);
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0.9;
            word-break: keep-all;
        }

        #close-btn {
            flex: 0 0 auto;
            width: auto;
            min-width: 58px;
            padding: 9px 11px;
            border: 0;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            background: rgba(255, 255, 255, 0.18);
            pointer-events: auto;
        }

        #bottom-panel {
            padding: 15px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom, 0));
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            background: #007aff;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        button.danger {
            background: #991b1b;
            flex: 0.4;
        }

        button:disabled {
            cursor: default;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        #result {
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 15px;
            line-height: 1.5;
            text-align: center;
            word-break: keep-all;
        }

        #crosshair {
            --crosshair-color: #00ff66;

            position: fixed;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%) scale(0.82);
            z-index: 6;
            pointer-events: none;
            border: 2px solid var(--crosshair-color);
            border-radius: 50%;
            opacity: 0;
            visibility: hidden;
            transition:
                opacity 0.22s ease,
                transform 0.22s ease,
                filter 0.22s ease,
                width 0.22s ease,
                height 0.22s ease;
            filter: drop-shadow(0 0 5px rgba(0, 0, 0, 0.75));
        }

        #crosshair.is-visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        #crosshair.is-hold {
            opacity: 0.48;
            transform: translate(-50%, -50%) scale(0.94);
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: var(--crosshair-color);
            transition:
                left 0.22s ease,
                right 0.22s ease,
                top 0.22s ease,
                bottom 0.22s ease,
                width 0.22s ease,
                height 0.22s ease,
                transform 0.22s ease;
        }

        #crosshair::before {
            top: 50%;
            left: -5px;
            right: -5px;
            height: 2px;
            transform: translateY(-50%);
        }

        #crosshair::after {
            left: 50%;
            top: -5px;
            bottom: -5px;
            width: 2px;
            transform: translateX(-50%);
        }

        /* 1단계: 벽과 바닥의 경계선을 맞추기 쉽도록 가로선만 확장한다. */
        #crosshair.mode-wall-floor::before {
            left: 50%;
            right: auto;
            width: 100px;
            transform: translate(-50%, -50%);
        }

        /* 2단계: 발끝 위치를 넓게 조준할 수 있도록 기존 조준점 전체를 키운다. */
        #crosshair.mode-toe {
            width: 48px;
            height: 48px;
        }

        /* 3단계: 이미지 높이는 기존 크기의 정밀 조준점을 사용한다. */
        #crosshair.mode-place-image {
            width: 30px;
            height: 30px;
        }

        #scan-guide {
            --scan-color: #00d4ff;

            position: fixed;
            top: 50%;
            left: 50%;
            z-index: 6;
            width: min(78vw, 260px);
            transform: translate(-50%, -50%) scale(0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition:
                opacity 0.25s ease,
                transform 0.25s ease;
        }

        #scan-guide.is-visible {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .scan-visual {
            position: relative;
            width: 116px;
            height: 116px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 520px;
        }

        .scan-cube {
            position: relative;
            width: 58px;
            height: 58px;
            transform-style: preserve-3d;
            animation:
                scan-cube-rotate 6s linear infinite,
                scan-cube-float 2.6s ease-in-out infinite;
            filter:
                drop-shadow(0 0 6px color-mix(in srgb, var(--scan-color) 70%, transparent)) drop-shadow(0 0 14px rgba(0, 0, 0, 0.45));
        }

        .scan-cube-face {
            position: absolute;
            inset: 0;
            border: 2px solid var(--scan-color);
            background: color-mix(in srgb, var(--scan-color) 7%, transparent);
            backface-visibility: visible;
        }

        .scan-cube-face.front {
            transform: translateZ(29px);
        }

        .scan-cube-face.back {
            transform: rotateY(180deg) translateZ(29px);
        }

        .scan-cube-face.right {
            transform: rotateY(90deg) translateZ(29px);
        }

        .scan-cube-face.left {
            transform: rotateY(-90deg) translateZ(29px);
        }

        .scan-cube-face.top {
            transform: rotateX(90deg) translateZ(29px);
        }

        .scan-cube-face.bottom {
            transform: rotateX(-90deg) translateZ(29px);
        }

        .scan-orbit {
            position: absolute;
            inset: 5px;
            border: 1px solid color-mix(in srgb, var(--scan-color) 58%, transparent);
            border-left-color: transparent;
            border-right-color: transparent;
            border-radius: 50%;
            transform: rotateX(68deg);
            animation: scan-orbit-rotate 3.4s linear infinite;
        }

        .scan-orbit::before,
        .scan-orbit::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 7px;
            height: 7px;
            margin-top: -3.5px;
            border-top: 2px solid var(--scan-color);
            border-right: 2px solid var(--scan-color);
        }

        .scan-orbit::before {
            left: -1px;
            transform: rotate(-135deg);
        }

        .scan-orbit::after {
            right: -1px;
            transform: rotate(45deg);
        }

        .scan-motion {
            display: grid;
            grid-template-columns: 30px minmax(0, 1fr) 30px;
            align-items: center;
            width: 100%;
            padding: 10px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 999px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        }

        .scan-motion-text {
            font-size: 13px;
            line-height: 1.4;
            font-weight: 800;
            text-align: center;
            color: #fff;
            word-break: keep-all;
        }

        .scan-arrow {
            font-size: 25px;
            line-height: 1;
            font-weight: 900;
            color: var(--scan-color);
            text-align: center;
            animation: scan-arrow-pulse 1.35s ease-in-out infinite;
        }

        .scan-arrow.right {
            animation-delay: 0.18s;
        }

        @keyframes scan-cube-rotate {
            from {
                transform: rotateX(-20deg) rotateY(0deg);
            }

            to {
                transform: rotateX(340deg) rotateY(360deg);
            }
        }

        @keyframes scan-cube-float {

            0%,
            100% {
                margin-top: -3px;
            }

            50% {
                margin-top: 5px;
            }
        }

        @keyframes scan-orbit-rotate {
            from {
                transform: rotateX(68deg) rotateZ(0deg);
            }

            to {
                transform: rotateX(68deg) rotateZ(360deg);
            }
        }

        @keyframes scan-arrow-pulse {

            0%,
            100% {
                opacity: 0.35;
                transform: translateX(0);
            }

            50% {
                opacity: 1;
                transform: translateX(3px);
            }
        }

        @media (prefers-reduced-motion: reduce) {

            .scan-cube,
            .scan-orbit,
            .scan-arrow {
                animation-duration: 12s;
            }
        }

        #ARButton {
            position: fixed !important;
            bottom: 50% !important;
            left: 50% !important;
            transform: translate(-50%, 50%) !important;
            z-index: 100 !important;

            width: min(52vw, 230px) !important;
            height: 44px !important;
            padding: 0 16px !important;

            border: 0 !important;
            border-radius: 999px !important;

            background: #ffe600 !important;
            color: #111 !important;

            font-size: 16px !important;
            font-weight: 900 !important;
            letter-spacing: -0.02em !important;

            box-shadow: 0 5px 16px rgba(0, 0, 0, 0.34) !important;
            opacity: 1 !important;

            display: flex !important;
            align-items: center !important;
            justify-content: center !important;

            cursor: pointer !important;
            -webkit-tap-highlight-color: transparent !important;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease !important;
        }

        #ARButton:active {
            transform: translate(-50%, 50%) scale(0.97) !important;
            background: #ffd400 !important;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.42) !important;
            opacity: 1 !important;
        }

        #unsupported-message {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #000;
            text-align: center;
        }

        #unsupported-message .box {
            width: min(100%, 340px);
            padding: 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
        }

        #unsupported-message h1 {
            margin: 0 0 12px;
            font-size: 20px;
        }

        #unsupported-message p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.85;
            word-break: keep-all;
        }

        #unsupported-back-btn {
            width: 100%;
            margin-top: 18px;
            background: rgba(255, 255, 255, 0.16);
        }
    </style>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.185.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.185.1/examples/jsm/"
      }
    }
    </script>
</head>

<body>
    <div id="crosshair" aria-hidden="true"></div>

    <div id="scan-guide" aria-hidden="true">
        <div class="scan-visual">
            <div class="scan-orbit"></div>
            <div class="scan-cube">
                <span class="scan-cube-face front"></span>
                <span class="scan-cube-face back"></span>
                <span class="scan-cube-face right"></span>
                <span class="scan-cube-face left"></span>
                <span class="scan-cube-face top"></span>
                <span class="scan-cube-face bottom"></span>
            </div>
        </div>
        <div class="scan-motion">
            <span class="scan-arrow left" aria-hidden="true">‹</span>
            <span class="scan-motion-text">
                휴대폰을 천천히 움직여<br>
                공간을 스캔하세요
            </span>
            <span class="scan-arrow right" aria-hidden="true">›</span>
        </div>
    </div>

    <div id="unsupported-message">
        <div class="box">
            <h1>AR 실행이 어려운 환경입니다</h1>
            <p id="unsupported-detail">
                이 기능은 WebXR AR을 지원하는 모바일 브라우저에서 사용할 수 있습니다.<br>
                Android Chrome에서 다시 시도해 주세요.
            </p>
            <button type="button" id="unsupported-back-btn">돌아가기</button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="top-panel">
            <div id="top-row">
                <div>
                    <div id="step-title">AR 준비</div>
                    <div id="product-name"></div>
                    <div id="guide-text">시작하기 버튼을 눌러 AR을 실행해 주세요.</div>
                </div>
                <button type="button" id="close-btn">닫기</button>
            </div>
        </div>

        <div id="bottom-panel" style="display: none;">
            <div id="result">주변 공간(벽과 바닥)을 천천히 비춰주세요.</div>
            <div class="row">
                <button type="button" id="action-btn">1단계: 벽/바닥선 확정</button>
                <button type="button" id="reset-btn" class="danger">초기화</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { ARButton } from 'three/addons/webxr/ARButton.js';
        import { Line2 } from 'three/addons/lines/Line2.js';
        import { LineGeometry } from 'three/addons/lines/LineGeometry.js';
        import { LineMaterial } from 'three/addons/lines/LineMaterial.js';

        const uiBottom = document.getElementById('bottom-panel');
        const stepTitle = document.getElementById('step-title');
        const guideText = document.getElementById('guide-text');
        const resultEl = document.getElementById('result');
        const actionBtn = document.getElementById('action-btn');
        const resetBtn = document.getElementById('reset-btn');
        const crosshair = document.getElementById('crosshair');
        const scanGuide = document.getElementById('scan-guide');
        const closeBtn = document.getElementById('close-btn');
        const productNameEl = document.getElementById('product-name');
        const unsupportedMessage = document.getElementById('unsupported-message');
        const unsupportedDetail = document.getElementById('unsupported-detail');
        const unsupportedBackBtn = document.getElementById('unsupported-back-btn');

        const params = new URLSearchParams(window.location.search);

        const IMAGE_URL = params.get('img') || './assets/fallback.jpg';
        const PRODUCT_NAME = params.get('name') || '상품 이미지';
        const PRODUCT_SIZE = params.get('size') || '';
        const RETURN_URL = getSafeReturnUrl(params.get('returnUrl') || '');

        renderProductName(PRODUCT_NAME, PRODUCT_SIZE);

        let container = null;
        let camera = null;
        let scene = null;
        let renderer = null;
        let arButton = null;
        let arButtonLabelObserver = null;
        let activeXRSession = null;

        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let hitTestSession = null;
        let hitTestRetryAfter = 0;

        let closeRequested = false;

        // 단계: ready -> wallFloor -> toe -> placeImage -> done
        let step = 'ready';
        let currentHitMatrix = null;

        // 평면 탐색 UI 상태. 1·2단계에서는 평면을 찾지 못하면 스캔 모션,
        // 인식하면 조준점을 표시한다. 일시적인 hit-test 누락으로 UI가
        // 깜빡이지 않도록 마지막 인식 후 일정 시간은 조준점을 유지한다.
        let targetingMode = 'hidden';
        let lastPlaneDetectedAt = 0;

        // 모든 측정 오브젝트는 이 루트 아래에 배치한다.
        // Anchor가 지원되면 필터링한 Anchor pose로 루트 행렬을 갱신하고,
        // 미지원 환경에서는 reference-space reset 보정 행렬을 적용한다.
        let contentRoot = null;
        let wallFloorMesh = null;
        let toeMesh = null;
        let lineMesh = null;
        let productDisplayGroup = null;

        let worldAnchor = null;
        let anchorFeatureEnabled = false;
        let anchorState = 'idle';
        let anchorRequestToken = 0;
        let pendingWallFloorSelection = false;
        let pendingWallFloorWorldMatrix = null;
        let anchorPoseMissingFrames = 0;
        let anchorAwaitingPoseFrames = 0;
        const lastValidContentRootMatrix = new THREE.Matrix4();
        let hasLastValidContentRootMatrix = false;

        // 2단계가 끝나면 기준점·발끝·거리선의 로컬 좌표는 더 이상
        // 변경하지 않는다. 실제 공간 고정은 Anchor를 삭제하지 않고 유지해
        // 담당하며, Anchor pose에는 흔들림 억제 필터를 적용한다.
        let spatialLockFinalized = false;

        const filteredAnchorPosition = new THREE.Vector3();
        const filteredAnchorQuaternion = new THREE.Quaternion();
        const filteredAnchorScale = new THREE.Vector3(1, 1, 1);
        let hasFilteredAnchorPose = false;

        const anchorJumpCandidatePosition = new THREE.Vector3();
        const anchorJumpCandidateQuaternion = new THREE.Quaternion();
        let hasAnchorJumpCandidate = false;
        let anchorJumpCandidateFrames = 0;
        let anchorTrackingHoldFrames = 0;

        let currentViewerPoseAvailable = false;
        let currentViewerPoseEmulated = false;

        let trackedReferenceSpace = null;
        let referenceSpaceResetHandler = null;
        let sessionVisibilityHandler = null;
        let lastViewerPoseAvailable = true;
        let lastViewerPoseEmulated = null;

        // Three.js가 제공하는 실제 공간 깊이 메시를 장면에 추가해
        // 가까운 현실 물체가 가상 상품을 가리도록 한다.
        let depthOcclusionMesh = null;
        let depthSensingState = 'idle';

        let lineProgress = 0;
        let isAnimatingLine = false;
        let savedDistanceText = '';
        let productLoadToken = 0;
        let isLoadingProductImage = false;
        let resultMessageLockUntil = 0;

        const TARGET_IMAGE_WIDTH_M = readMeterParam('w', 0.4);
        const TARGET_IMAGE_HEIGHT_M = readMeterParam('h', 0.5);

        // URL에 margin=0처럼 전달하면 상품별 이미지 여백을 조절할 수 있다.
        // 기존 동작을 유지하기 위해 기본값은 상하좌우 각각 10cm이다.
        const IMAGE_MARGIN_PER_SIDE_M = readMeterParam('margin', 0.1, 0, 1);
        const RENDER_IMAGE_WIDTH_M = TARGET_IMAGE_WIDTH_M + (IMAGE_MARGIN_PER_SIDE_M * 2);
        const RENDER_IMAGE_HEIGHT_M = TARGET_IMAGE_HEIGHT_M + (IMAGE_MARGIN_PER_SIDE_M * 2);

        const FRAME_DEPTH_M = 0.04;
        const FRAME_BODY_COLOR = 0x8d7756;
        const FRONT_IMAGE_OFFSET_M = 0.001;

        // 1·2단계에서 바닥 평면을 판별할 때 사용하는 기준값이다.
        const SURFACE_VERTICALITY_THRESHOLD = 0.65;

        // 3단계는 벽면 hit-test를 사용하지 않는다.
        // 1단계 기준점과 2단계 발끝으로 가상의 수직 벽면을 만들고,
        // 화면 중앙 시선과 그 벽면이 만나는 높이를 계산한다.
        const MIN_WALL_REFERENCE_DISTANCE_M = 0.15;
        const MIN_CENTER_RAY_WALL_ALIGNMENT = 0.08;
        const MAX_CENTER_RAY_DISTANCE_M = 12;
        const MAX_PLACEMENT_CENTER_HEIGHT_ABOVE_FLOOR_M = 4.5;

        // 깊이 오클루전은 기기별 깊이 오차 때문에 전체 콘텐츠가 순간적으로
        // 가려지는 현상을 만들 수 있어 기본값을 끈다. 필요하면 URL에 depth=1.
        const ENABLE_DEPTH_OCCLUSION = params.get('depth') === '1';

        // 프레임 뒷면까지 실제 벽 앞에 남도록 본체 깊이보다 조금 더 띄운다.
        const WALL_FRONT_OFFSET_M = FRAME_DEPTH_M + 0.005;

        const ANCHOR_AWAITING_POSE_LIMIT_FRAMES = 300;
        const ANCHOR_CREATION_TIMEOUT_MS = 8000;
        const ANCHOR_MISSING_WARNING_FRAMES = 90;

        // Anchor pose 안정화 필터. 거리선의 로컬 좌표는 고정하고,
        // 실제 공간에 대한 루트 pose의 작은 잡음과 순간 점프만 억제한다.
        const ANCHOR_POSITION_DEADBAND_M = 0.010;
        const ANCHOR_ROTATION_DEADBAND_RAD = THREE.MathUtils.degToRad(0.5);
        const ANCHOR_LARGE_JUMP_POSITION_M = 0.18;
        const ANCHOR_LARGE_JUMP_ROTATION_RAD = THREE.MathUtils.degToRad(10);
        const ANCHOR_JUMP_CONFIRM_FRAMES = 12;
        const ANCHOR_JUMP_POSITION_TOLERANCE_M = 0.05;
        const ANCHOR_JUMP_ROTATION_TOLERANCE_RAD = THREE.MathUtils.degToRad(4);
        const ANCHOR_POSITION_SMOOTHING = 0.18;
        const ANCHOR_ROTATION_SMOOTHING = 0.16;
        const ANCHOR_MAX_POSITION_STEP_M = 0.018;
        const ANCHOR_MAX_ROTATION_STEP_RAD = THREE.MathUtils.degToRad(1.2);
        const ANCHOR_TRACKING_HOLD_WARNING_FRAMES = 90;

        // hit-test가 한두 프레임 누락됐을 때 스캔 UI와 조준점이
        // 깜빡이지 않도록 마지막 평면 인식 후 이 시간만큼 유예한다.
        const PLANE_LOST_DELAY_MS = 1800;

        init().catch((error) => {
            console.error('[AR] 초기화 실패:', error);
            showUnsupportedMessage(
                'AR 기능을 초기화하지 못했습니다. 페이지를 새로고침하거나 Android Chrome에서 다시 시도해 주세요.'
            );
        });

        function readMeterParam(name, fallback, min = 0.05, max = 3) {
            const value = Number.parseFloat(params.get(name));

            if (!Number.isFinite(value)) {
                return fallback;
            }

            return Math.min(Math.max(value, min), max);
        }

        function renderProductName(name, sizeText) {
            const cleanName = (name || '상품 이미지').trim();
            const cleanSizeText = (sizeText || '').trim();

            const parts = cleanName
                .split('/')
                .map((part) => part.replace(/\s+/g, ' ').trim())
                .filter(Boolean);

            productNameEl.replaceChildren();

            if (parts.length >= 2) {
                const artistEl = document.createElement('div');
                artistEl.className = 'ar-product-artist';
                artistEl.textContent = parts[0];

                const titleEl = document.createElement('div');
                titleEl.className = 'ar-product-title';
                titleEl.textContent = parts.slice(1).join(' / ');

                productNameEl.append(artistEl, titleEl);
            } else {
                const nameEl = document.createElement('div');
                nameEl.className = 'ar-product-title';
                nameEl.textContent = cleanName;

                productNameEl.appendChild(nameEl);
            }

            if (cleanSizeText) {
                const sizeEl = document.createElement('div');
                sizeEl.className = 'ar-product-size';
                sizeEl.textContent = cleanSizeText;

                productNameEl.appendChild(sizeEl);
            }
        }

        function getSafeReturnUrl(rawUrl) {
            if (!rawUrl) return '';

            try {
                const url = new URL(rawUrl, window.location.origin);

                // 외부 사이트로 이동하지 않도록 동일 출처 URL만 허용한다.
                if (url.origin !== window.location.origin) {
                    return '';
                }

                return url.href;
            } catch (error) {
                console.warn('[AR] returnUrl 파싱 실패:', error);
                return '';
            }
        }

        function goBackToProductPage() {
            if (RETURN_URL) {
                window.location.replace(RETURN_URL);
                return;
            }

            if (document.referrer) {
                try {
                    const referrerUrl = new URL(document.referrer);

                    if (
                        referrerUrl.origin === window.location.origin &&
                        referrerUrl.href !== window.location.href
                    ) {
                        window.location.replace(referrerUrl.href);
                        return;
                    }
                } catch (error) {
                    console.warn('[AR] referrer 파싱 실패:', error);
                }
            }

            window.location.replace('/product/list.html');
        }

        function showUnsupportedMessage(message) {
            unsupportedDetail.textContent = message;
            unsupportedMessage.style.display = 'flex';
        }

        async function init() {
            closeBtn.addEventListener('click', handleCloseRequest);
            unsupportedBackBtn.addEventListener('click', goBackToProductPage);
            actionBtn.addEventListener('click', onActionTriggered);
            resetBtn.addEventListener('click', resetMeasurement);
            window.addEventListener('resize', onWindowResize);

            if (!window.isSecureContext) {
                showUnsupportedMessage(
                    'WebXR AR은 HTTPS 보안 연결에서만 실행할 수 있습니다. HTTPS 주소로 접속해 주세요.'
                );
                return;
            }

            if (!navigator.xr) {
                showUnsupportedMessage(
                    '이 브라우저는 WebXR AR을 지원하지 않습니다. Android Chrome에서 다시 시도해 주세요.'
                );
                return;
            }

            let immersiveArSupported = false;

            try {
                immersiveArSupported = await navigator.xr.isSessionSupported('immersive-ar');
            } catch (error) {
                console.error('[AR] 지원 여부 확인 실패:', error);
            }

            if (!immersiveArSupported) {
                showUnsupportedMessage(
                    '이 기기 또는 브라우저에서는 몰입형 AR 세션을 실행할 수 없습니다. Android Chrome에서 다시 시도해 주세요.'
                );
                return;
            }

            container = document.createElement('div');
            document.body.appendChild(container);

            scene = new THREE.Scene();

            contentRoot = new THREE.Group();
            contentRoot.name = 'world-locked-content-root';
            contentRoot.matrixAutoUpdate = false;
            contentRoot.matrix.identity();
            scene.add(contentRoot);

            camera = new THREE.PerspectiveCamera(
                70,
                window.innerWidth / window.innerHeight,
                0.01,
                20
            );

            renderer = new THREE.WebGLRenderer({
                antialias: true,
                alpha: true
            });

            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            container.appendChild(renderer.domElement);

            const optionalFeatures = [
                'dom-overlay',
                'anchors'
            ];

            if (ENABLE_DEPTH_OCCLUSION) {
                optionalFeatures.push('depth-sensing');
            }

            const arSessionOptions = {
                requiredFeatures: ['hit-test'],
                optionalFeatures,
                domOverlay: {
                    root: document.body
                }
            };

            if (ENABLE_DEPTH_OCCLUSION) {
                arSessionOptions.depthSensing = {
                    usagePreference: ['gpu-optimized'],
                    dataFormatPreference: ['float32', 'luminance-alpha']
                };
            }

            arButton = ARButton.createButton(renderer, arSessionOptions);

            arButton.style.visibility = 'hidden';
            document.body.appendChild(arButton);
            observeAndLocalizeARButton();

            renderer.xr.addEventListener('sessionstart', handleSessionStart);
            renderer.xr.addEventListener('sessionend', handleSessionEnd);
            renderer.setAnimationLoop(render);
        }

        function handleCloseRequest() {
            closeRequested = true;

            if (renderer?.xr?.isPresenting) {
                const session = renderer.xr.getSession();

                if (session) {
                    session.end().catch((error) => {
                        console.error('[AR] 세션 종료 실패:', error);
                        goBackToProductPage();
                    });
                    return;
                }
            }

            goBackToProductPage();
        }

        function observeAndLocalizeARButton() {
            if (!arButton) return;

            const localizeLabel = () => {
                const currentLabel = arButton.textContent.trim();

                if (currentLabel === 'START AR') {
                    arButton.textContent = '시작하기';
                } else if (currentLabel === 'STOP AR') {
                    arButton.textContent = '종료하기';
                }

                if (arButton.textContent.trim()) {
                    arButton.style.visibility = 'visible';
                }
            };

            arButtonLabelObserver = new MutationObserver(localizeLabel);
            arButtonLabelObserver.observe(arButton, {
                childList: true,
                characterData: true,
                subtree: true
            });

            localizeLabel();
        }

        function handleSessionStart() {
            if (!arButton || !renderer) return;

            closeRequested = false;
            currentHitMatrix = null;
            clearHitTestSource();
            detachReferenceSpaceListener();

            arButton.style.setProperty('display', 'none', 'important');
            arButton.style.setProperty('visibility', 'hidden', 'important');
            arButton.style.setProperty('pointer-events', 'none', 'important');

            setTargetingMode('hidden');
            uiBottom.style.display = 'block';

            const session = renderer.xr.getSession();
            activeXRSession = session;
            const enabledFeatures = session?.enabledFeatures
                ? Array.from(session.enabledFeatures)
                : [];

            const anchorApiPresent =
                typeof globalThis.XRHitTestResult !== 'undefined' &&
                typeof globalThis.XRHitTestResult.prototype?.createAnchor === 'function';

            // 일부 구현은 enabledFeatures를 노출하지 않으므로 API 존재 여부도
            // 함께 확인한다. 실제 생성 실패 시 자동으로 폴백한다.
            anchorFeatureEnabled =
                enabledFeatures.includes('anchors') ||
                (enabledFeatures.length === 0 && anchorApiPresent);

            console.info(
                anchorFeatureEnabled
                    ? '[AR] WebXR Anchor 사용을 시도합니다.'
                    : '[AR] Anchor 미지원: 기준 공간 reset 보정 폴백을 사용합니다.'
            );

            if (ENABLE_DEPTH_OCCLUSION) {
                depthSensingState = 'pending';

                if (enabledFeatures.length > 0 && !enabledFeatures.includes('depth-sensing')) {
                    depthSensingState = 'unsupported';
                    console.info('[AR] 깊이 오클루전을 지원하지 않아 기본 AR로 실행합니다.');
                }
            } else {
                depthSensingState = 'disabled';
            }

            if (session) {
                sessionVisibilityHandler = () => {
                    console.info('[AR] 세션 가시성 변경:', session.visibilityState);
                };
                session.addEventListener('visibilitychange', sessionVisibilityHandler);
            }

            resetMeasurement();
        }

        function handleSessionEnd() {
            if (!arButton) return;

            arButton.style.removeProperty('display');
            arButton.style.removeProperty('visibility');
            arButton.style.removeProperty('pointer-events');

            queueMicrotask(() => {
                if (arButton.textContent.trim() === 'START AR') {
                    arButton.textContent = '시작하기';
                }
            });

            setTargetingMode('hidden');
            uiBottom.style.display = 'none';

            if (activeXRSession && sessionVisibilityHandler) {
                activeXRSession.removeEventListener('visibilitychange', sessionVisibilityHandler);
            }
            activeXRSession = null;
            sessionVisibilityHandler = null;

            detachReferenceSpaceListener();
            clearHitTestSource();
            removeDepthOcclusionMesh();
            depthSensingState = 'idle';
            currentHitMatrix = null;

            resetMeasurement();

            if (closeRequested) {
                goBackToProductPage();
            }
        }

        function setGuideText(text) {
            guideText.textContent = text;
        }

        function setCrosshairColor(color) {
            crosshair.style.setProperty('--crosshair-color', color);
            scanGuide.style.setProperty('--scan-color', color);
        }

        function setCrosshairStepMode(nextStep) {
            crosshair.classList.remove(
                'mode-wall-floor',
                'mode-toe',
                'mode-place-image'
            );

            if (nextStep === 'wallFloor') {
                crosshair.classList.add('mode-wall-floor');
            } else if (nextStep === 'toe') {
                crosshair.classList.add('mode-toe');
            } else if (nextStep === 'placeImage') {
                crosshair.classList.add('mode-place-image');
            }
        }

        function setTargetingMode(nextMode) {
            if (targetingMode === nextMode) return;

            targetingMode = nextMode;

            const showScan = nextMode === 'scan';
            const showCrosshair =
                nextMode === 'crosshair' ||
                nextMode === 'hold';

            scanGuide.classList.toggle('is-visible', showScan);
            scanGuide.setAttribute('aria-hidden', showScan ? 'false' : 'true');

            crosshair.classList.toggle('is-visible', showCrosshair);
            crosshair.classList.toggle('is-hold', nextMode === 'hold');
            crosshair.setAttribute('aria-hidden', showCrosshair ? 'false' : 'true');
        }

        function syncTargetingUIForStep() {
            if (!renderer?.xr?.isPresenting) {
                setTargetingMode('hidden');
                return;
            }

            if (step === 'placeImage') {
                setTargetingMode('crosshair');
                return;
            }

            if (step === 'done' || step === 'ready') {
                setTargetingMode('hidden');
                return;
            }

            if (step === 'wallFloor' || step === 'toe') {
                const now = performance.now();

                if (
                    currentHitMatrix &&
                    lastPlaneDetectedAt > 0
                ) {
                    setTargetingMode('crosshair');
                } else if (
                    lastPlaneDetectedAt > 0 &&
                    now - lastPlaneDetectedAt < PLANE_LOST_DELAY_MS
                ) {
                    setTargetingMode('hold');
                } else {
                    setTargetingMode('scan');
                }
            }
        }

        function markPlaneDetected() {
            lastPlaneDetectedAt = performance.now();

            if (step === 'wallFloor' || step === 'toe') {
                setTargetingMode('crosshair');
            }
        }

        function markPlaneMissing(now = performance.now()) {
            if (step !== 'wallFloor' && step !== 'toe') return;

            if (
                lastPlaneDetectedAt > 0 &&
                now - lastPlaneDetectedAt < PLANE_LOST_DELAY_MS
            ) {
                setTargetingMode('hold');
            } else {
                setTargetingMode('scan');
            }
        }

        function setStep(nextStep) {
            step = nextStep;
            setCrosshairStepMode(nextStep);

            if (step === 'wallFloor') {
                stepTitle.textContent = '1단계: 벽/바닥선';
                stepTitle.style.color = '#00d4ff';
                setCrosshairColor('#00d4ff');

                setGuideText('벽면과 바닥이 만나는 모서리의 바닥 지점을 조준점에 맞추고 버튼을 누르세요.');
                actionBtn.textContent = '벽/바닥선 확정';
                actionBtn.style.background = '#00d4ff';
                actionBtn.style.color = '#fff';
                actionBtn.disabled = false;

            } else if (step === 'toe') {
                stepTitle.textContent = '2단계: 사용자의 발끝';
                stepTitle.style.color = '#ffe600';
                setCrosshairColor('#ffe600');

                setGuideText('1단계 기준점에서 벽과 직각 방향으로 한 걸음 물러선 사용자의 발끝을 조준점에 맞추고 버튼을 누르세요.');
                actionBtn.textContent = '발끝 확정';
                actionBtn.style.background = '#ffe600';
                actionBtn.style.color = '#000';
                actionBtn.disabled = false;

            } else if (step === 'placeImage') {
                stepTitle.textContent = '3단계: 벽면 이미지 배치';
                stepTitle.style.color = '#ff00ff';
                setCrosshairColor('#ff00ff');

                // 3단계에서는 벽면 hit-test를 요구하지 않는다.
                // 기준점 수직 위를 화면 중앙에 맞춘 상태에서 휴대폰 기울기로 높이를 정한다.
                currentHitMatrix = null;
                setGuideText('기준점의 수직 위를 화면 중앙에 맞춘 뒤, 휴대폰을 위아래로 기울여 원하는 높이에서 버튼을 누르세요.');
                actionBtn.textContent = '여기에 이미지 부착';
                actionBtn.style.background = '#ff00ff';
                actionBtn.style.color = '#fff';
                actionBtn.disabled = false;

            } else if (step === 'done') {
                stepTitle.textContent = '배치 완료';
                stepTitle.style.color = '#00ff66';
                setCrosshairColor('#fff');

                setGuideText('줄자와 상품 이미지가 고정되었습니다. 자유롭게 이동하며 확인해 보세요.');
                actionBtn.textContent = '완료됨';
                actionBtn.style.background = '#374151';
                actionBtn.style.color = '#fff';
                actionBtn.disabled = true;
            }

            syncTargetingUIForStep();
        }

        function onActionTriggered() {
            // 1·2단계만 실제 바닥 hit-test가 필요하다.
            const hitRequiredSteps = ['wallFloor', 'toe'];

            if (hitRequiredSteps.includes(step) && !currentHitMatrix) {
                resultEl.innerHTML = `
                    <span style="color:#ffcc00; font-weight:800;">
                        아직 바닥 평면을 인식하지 못했습니다.
                    </span><br>
                    <span style="font-size:0.95em;">
                        조준할 바닥 위치를 천천히 비춘 뒤 다시 시도해 주세요.
                    </span>
                `;

                resultMessageLockUntil = performance.now() + 1500;
                actionBtn.style.opacity = '0.75';

                window.setTimeout(() => {
                    actionBtn.style.opacity = '1';
                }, 500);

                return;
            }

            const hitMatrix = currentHitMatrix
                ? new THREE.Matrix4().fromArray(currentHitMatrix)
                : null;
            const hitSurfaceNormal = hitMatrix
                ? new THREE.Vector3(0, 1, 0).transformDirection(hitMatrix)
                : null;
            const surfaceUpAlignment = hitSurfaceNormal
                ? Math.abs(hitSurfaceNormal.y)
                : 0;

            if (
                (step === 'wallFloor' || step === 'toe') &&
                surfaceUpAlignment < SURFACE_VERTICALITY_THRESHOLD
            ) {
                resultEl.innerHTML = `
                    <span style="color:#ffcc00; font-weight:800;">
                        바닥 평면을 조준해 주세요.
                    </span><br>
                    <span style="font-size:0.95em;">
                        거리 측정을 위해 조준점을 바닥에 맞춰야 합니다.
                    </span>
                `;
                resultMessageLockUntil = performance.now() + 1800;
                return;
            }

            if (step === 'wallFloor') {
                // XRAnchor 생성은 활성 XRFrame 안에서만 가능하다.
                // 클릭 시 요청만 예약하고 다음 updateHitTest()에서 생성한다.
                pendingWallFloorSelection = true;
                actionBtn.disabled = true;
                actionBtn.style.opacity = '0.75';
                resultEl.innerHTML = `
                    <span style="color:#00d4ff; font-weight:800;">
                        기준점을 실제 공간에 고정하는 중입니다...
                    </span>
                `;
                resultMessageLockUntil = Number.POSITIVE_INFINITY;

            } else if (step === 'toe') {
                const referencePosition = new THREE.Vector3()
                    .setFromMatrixPosition(hitMatrix);
                const localPosition = referencePositionToContentLocal(referencePosition);

                const geometry = new THREE.SphereGeometry(0.02, 24, 24);
                const material = new THREE.MeshBasicMaterial({
                    color: 0xffe600,
                    depthTest: false
                });

                toeMesh = new THREE.Mesh(geometry, material);
                toeMesh.position.copy(localPosition);
                toeMesh.scale.setScalar(0);
                toeMesh.renderOrder = 100;
                contentRoot.add(toeMesh);

                const dx = toeMesh.position.x - wallFloorMesh.position.x;
                const dz = toeMesh.position.z - wallFloorMesh.position.z;
                const distanceInMeters = Math.hypot(dx, dz);

                if (distanceInMeters < MIN_WALL_REFERENCE_DISTANCE_M) {
                    disposeObject(toeMesh);
                    toeMesh = null;

                    resultEl.innerHTML = `
                        <span style="color:#ffcc00; font-weight:800;">
                            기준점과 발끝이 너무 가깝습니다.
                        </span><br>
                        <span style="font-size:0.95em;">
                            기준점에서 벽과 직각 방향으로 조금 더 물러난 발끝을 다시 등록해 주세요.
                        </span>
                    `;
                    resultMessageLockUntil = performance.now() + 2500;
                    return;
                }

                createMeasurementLine();

                lineProgress = 0;
                isAnimatingLine = true;

                const distanceInCm = Math.round(distanceInMeters * 100);

                savedDistanceText =
                    `<span style="font-size:1.2em; color:#ffe600; font-weight:bold;">★ 벽 ↔ 발끝 거리: ${distanceInCm}cm</span>`;

                // 벽 기준점과 발끝의 로컬 좌표를 최종 확정한다.
                // Anchor는 삭제하지 않고 유지하며, 이후에는 필터링된
                // Anchor pose만 contentRoot에 적용한다.
                finalizeSpatialLock();

                resultEl.innerHTML =
                    savedDistanceText +
                    '<br><span style="color:#ff00ff;">측정 기준을 고정했습니다. 기준점의 수직 위를 화면 중앙에 맞추고 휴대폰을 위아래로 기울여 높이를 정해 주세요.</span>';

                setStep('placeImage');

            } else if (step === 'placeImage') {
                placeProductImage();

            } else if (step === 'done') {
                resultEl.innerHTML =
                    savedDistanceText +
                    '<br><span style="color:#00ff66;">이미 배치가 완료되었습니다. 초기화 후 다시 시도할 수 있습니다.</span>';
            }
        }

        function createMeasurementLine() {
            const lineGeometry = new LineGeometry();
            lineGeometry.setPositions([
                wallFloorMesh.position.x,
                wallFloorMesh.position.y,
                wallFloorMesh.position.z,
                wallFloorMesh.position.x,
                wallFloorMesh.position.y,
                wallFloorMesh.position.z
            ]);

            const lineMaterial = new LineMaterial({
                color: 0x00ff66,
                linewidth: 5
            });
            lineMaterial.resolution.set(window.innerWidth, window.innerHeight);

            lineMesh = new Line2(lineGeometry, lineMaterial);
            lineMesh.frustumCulled = false;
            lineMesh.computeLineDistances();
            contentRoot.add(lineMesh);
        }

        function getScreenCenterWallPlacement() {
            if (!wallFloorMesh || !toeMesh || !renderer?.xr?.isPresenting) {
                return {
                    ok: false,
                    message: '이미지 배치 기준을 확인할 수 없습니다. 처음부터 다시 진행해 주세요.'
                };
            }

            const wallBasePoint = wallFloorMesh.position.clone();

            // 1단계 기준점에서 2단계 발끝으로 향하는 수평 방향을
            // 벽면의 법선으로 사용한다. 두 점이 충분히 떨어져 있어야
            // 벽의 앞쪽 방향을 안정적으로 계산할 수 있다.
            const wallNormal = toeMesh.position
                .clone()
                .sub(wallBasePoint);
            wallNormal.y = 0;

            const wallReferenceDistance = wallNormal.length();

            if (wallReferenceDistance < MIN_WALL_REFERENCE_DISTANCE_M) {
                return {
                    ok: false,
                    message: '벽 기준점과 발끝이 너무 가깝습니다. 초기화 후 발끝 위치를 조금 더 떨어진 곳에 등록해 주세요.'
                };
            }

            wallNormal.normalize();

            const xrCamera = renderer.xr.getCamera();
            const cameraPosition = new THREE.Vector3();
            const cameraDirection = new THREE.Vector3();

            xrCamera.getWorldPosition(cameraPosition);
            xrCamera.getWorldDirection(cameraDirection);

            // 카메라의 월드 좌표를 Anchor 루트의 로컬 좌표로 변환한다.
            // 이후 계산과 상품 배치를 모두 같은 좌표계에서 수행한다.
            const rootInverse = getContentRootWorldInverse();
            cameraPosition.applyMatrix4(rootInverse);
            cameraDirection.transformDirection(rootInverse);

            if (cameraDirection.lengthSq() < 0.000001) {
                return {
                    ok: false,
                    message: '휴대폰의 바라보는 방향을 계산하지 못했습니다. 기기를 조금 움직인 뒤 다시 시도해 주세요.'
                };
            }

            cameraDirection.normalize();

            // 법선이 현재 사용자 반대쪽을 향하면 뒤집어 항상 벽에서
            // 사용자 쪽을 향하도록 만든다.
            const wallToCamera = cameraPosition
                .clone()
                .sub(wallBasePoint);
            wallToCamera.y = 0;

            if (wallNormal.dot(wallToCamera) < 0) {
                wallNormal.negate();
            }

            // 화면 중앙 광선과 가상 벽면의 교차 거리 t를 계산한다.
            // wallNormal은 사용자 쪽을 향하므로 벽을 바라보는 광선은
            // 일반적으로 음의 내적값을 가져야 한다.
            const rayWallAlignment = wallNormal.dot(cameraDirection);

            if (rayWallAlignment >= -MIN_CENTER_RAY_WALL_ALIGNMENT) {
                return {
                    ok: false,
                    message: '화면 중앙이 기준점 방향의 벽을 향하지 않습니다. 기준점의 수직 위를 바라보도록 휴대폰을 돌려 주세요.'
                };
            }

            const numerator = wallNormal.dot(
                wallBasePoint.clone().sub(cameraPosition)
            );
            const rayDistance = numerator / rayWallAlignment;

            if (
                !Number.isFinite(rayDistance) ||
                rayDistance <= 0 ||
                rayDistance > MAX_CENTER_RAY_DISTANCE_M
            ) {
                return {
                    ok: false,
                    message: '화면 중앙선과 벽면의 교차 위치를 안정적으로 계산하지 못했습니다. 기준점 방향을 바라본 뒤 다시 시도해 주세요.'
                };
            }

            const screenCenterIntersection = cameraPosition
                .clone()
                .addScaledVector(cameraDirection, rayDistance);

            if (!Number.isFinite(screenCenterIntersection.y)) {
                return {
                    ok: false,
                    message: '배치 높이를 계산하지 못했습니다. 휴대폰을 조금 움직인 뒤 다시 시도해 주세요.'
                };
            }

            // 이미지 하단이 바닥 밑으로 내려가지 않도록 중심의 최저 높이를 제한한다.
            const minimumCenterHeight =
                wallBasePoint.y + (RENDER_IMAGE_HEIGHT_M / 2);
            const maximumCenterHeight =
                wallBasePoint.y + MAX_PLACEMENT_CENTER_HEIGHT_ABOVE_FLOOR_M;

            if (screenCenterIntersection.y > maximumCenterHeight) {
                return {
                    ok: false,
                    message: '계산된 배치 높이가 너무 높습니다. 휴대폰을 조금 아래로 기울인 뒤 다시 시도해 주세요.'
                };
            }

            const placementHeight = Math.max(
                screenCenterIntersection.y,
                minimumCenterHeight
            );

            // 좌우 및 깊이 위치는 항상 1단계 기준점에 고정하고,
            // 화면 중앙 광선에서 계산한 Y 높이만 적용한다.
            const placementPosition = new THREE.Vector3(
                wallBasePoint.x,
                placementHeight,
                wallBasePoint.z
            );

            return {
                ok: true,
                placementPosition,
                wallNormal,
                cameraPosition,
                screenCenterIntersection,
                wasRaisedToFloorLimit:
                    screenCenterIntersection.y < minimumCenterHeight
            };
        }

        function showPlacementCalculationError(message) {
            resultEl.innerHTML =
                savedDistanceText +
                `<br><span style="color:#ffcc00; font-weight:800;">${message}</span>`;
            resultMessageLockUntil = performance.now() + 2500;

            actionBtn.style.opacity = '0.75';
            window.setTimeout(() => {
                if (!isLoadingProductImage && step === 'placeImage') {
                    actionBtn.style.opacity = '1';
                }
            }, 500);
        }

        function placeProductImage() {
            const placement = getScreenCenterWallPlacement();

            if (!placement.ok) {
                showPlacementCalculationError(placement.message);
                return;
            }

            // 이미지 다운로드가 끝날 때 사용자가 기기를 움직여도
            // 클릭 순간에 계산한 위치와 방향이 바뀌지 않도록 복사한다.
            const placementPosition = placement.placementPosition.clone();
            const wallNormal = placement.wallNormal.clone();
            const wasRaisedToFloorLimit = placement.wasRaisedToFloorLimit;

            const loadToken = ++productLoadToken;
            isLoadingProductImage = true;
            resultMessageLockUntil = 0;

            actionBtn.disabled = true;
            actionBtn.style.opacity = '0.75';
            resultEl.innerHTML =
                savedDistanceText +
                '<br><span style="color:#ff00ff;">상품 이미지를 불러오는 중입니다...</span>';

            const textureLoader = new THREE.TextureLoader();
            textureLoader.setCrossOrigin('anonymous');

            textureLoader.load(
                IMAGE_URL,
                (texture) => {
                    const isStale =
                        loadToken !== productLoadToken ||
                        !renderer?.xr?.isPresenting ||
                        step !== 'placeImage';

                    if (isStale) {
                        texture.dispose();

                        if (loadToken === productLoadToken) {
                            isLoadingProductImage = false;
                        }

                        return;
                    }

                    texture.colorSpace = THREE.SRGBColorSpace;

                    productDisplayGroup = new THREE.Group();

                    const frameBodyGeometry = new THREE.BoxGeometry(
                        RENDER_IMAGE_WIDTH_M,
                        RENDER_IMAGE_HEIGHT_M,
                        FRAME_DEPTH_M
                    );

                    const frameBodyMaterial = new THREE.MeshBasicMaterial({
                        color: FRAME_BODY_COLOR,
                        toneMapped: false
                    });

                    const frameBodyMesh = new THREE.Mesh(
                        frameBodyGeometry,
                        frameBodyMaterial
                    );

                    frameBodyMesh.position.z = -(FRAME_DEPTH_M / 2);
                    productDisplayGroup.add(frameBodyMesh);

                    const imageGeometry = new THREE.PlaneGeometry(
                        RENDER_IMAGE_WIDTH_M,
                        RENDER_IMAGE_HEIGHT_M
                    );

                    const imageMaterial = new THREE.MeshBasicMaterial({
                        map: texture,
                        side: THREE.DoubleSide,
                        transparent: true,
                        toneMapped: false
                    });

                    const frontImageMesh = new THREE.Mesh(
                        imageGeometry,
                        imageMaterial
                    );

                    frontImageMesh.position.z = FRONT_IMAGE_OFFSET_M;
                    productDisplayGroup.add(frontImageMesh);

                    // 상품 앞면(+Z)이 벽에서 사용자 쪽을 향하도록 정렬한다.
                    productDisplayGroup.quaternion.setFromUnitVectors(
                        new THREE.Vector3(0, 0, 1),
                        wallNormal
                    );

                    // X/Z는 1단계 기준점에 고정하고 Y만 휴대폰 각도로 계산한다.
                    // 벽과의 깊이 충돌을 줄이기 위해 사용자 쪽으로 1cm 띄운다.
                    productDisplayGroup.position
                        .copy(placementPosition)
                        .addScaledVector(wallNormal, WALL_FRONT_OFFSET_M);

                    contentRoot.add(productDisplayGroup);

                    resultEl.innerHTML =
                        savedDistanceText +
                        (wasRaisedToFloorLimit
                            ? '<br><span style="color:#00ff66;">상품을 배치했습니다. 이미지가 바닥 아래로 내려가지 않도록 최저 높이가 적용되었습니다.</span>'
                            : '<br><span style="color:#00ff66;">화면 중앙의 조준 높이에 상품 이미지를 배치했습니다!</span>');

                    isLoadingProductImage = false;
                    resultMessageLockUntil = 0;
                    actionBtn.style.opacity = '1';
                    setStep('done');
                },
                undefined,
                (error) => {
                    if (loadToken !== productLoadToken) return;

                    isLoadingProductImage = false;
                    console.error('[AR] 이미지 로드 실패:', error, IMAGE_URL);

                    resultEl.innerHTML = `
                        <span style="color:#ffcc00; font-weight:800;">
                            상품 이미지를 불러오지 못했습니다.
                        </span><br>
                        <span style="font-size:0.95em;">
                            이미지 경로와 외부 이미지의 CORS 접근 권한을 확인해 주세요.
                        </span>
                    `;

                    resultMessageLockUntil = performance.now() + 4000;
                    actionBtn.disabled = false;
                    actionBtn.style.opacity = '1';
                }
            );
        }

        function resetMeasurement() {
            productLoadToken++;
            anchorRequestToken++;
            isLoadingProductImage = false;
            resultMessageLockUntil = 0;
            pendingWallFloorSelection = false;
            pendingWallFloorWorldMatrix = null;

            releaseWorldAnchor();

            disposeObject(wallFloorMesh);
            disposeObject(toeMesh);
            disposeObject(lineMesh);
            disposeObject(productDisplayGroup);

            wallFloorMesh = null;
            toeMesh = null;
            lineMesh = null;
            productDisplayGroup = null;

            resetContentRootMatrix();

            anchorState = 'idle';
            anchorPoseMissingFrames = 0;
            anchorAwaitingPoseFrames = 0;
            hasLastValidContentRootMatrix = false;
            lastValidContentRootMatrix.identity();

            spatialLockFinalized = false;
            resetAnchorPoseFilter();
            currentViewerPoseAvailable = false;
            currentViewerPoseEmulated = false;

            isAnimatingLine = false;
            lineProgress = 0;
            savedDistanceText = '';
            currentHitMatrix = null;
            lastPlaneDetectedAt = 0;

            actionBtn.disabled = false;
            actionBtn.style.opacity = '1';

            resultEl.textContent = '주변 공간(벽과 바닥)을 천천히 비춰주세요.';

            if (renderer?.xr?.isPresenting) {
                setStep('wallFloor');
            } else {
                step = 'ready';
                setCrosshairStepMode('ready');
                stepTitle.textContent = 'AR 준비';
                stepTitle.style.color = '#00ff66';
                setCrosshairColor('#00ff66');
                setGuideText('시작하기 버튼을 눌러 AR을 실행해 주세요.');
            }
        }

        function disposeObject(object) {
            if (!object) return;

            object.removeFromParent();

            object.traverse((child) => {
                if (child.geometry) {
                    child.geometry.dispose();
                }

                if (child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(disposeMaterial);
                    } else {
                        disposeMaterial(child.material);
                    }
                }
            });
        }

        function disposeMaterial(material) {
            if (!material) return;

            if (material.map) {
                material.map.dispose();
            }

            material.dispose();
        }

        function resetContentRootMatrix() {
            if (!contentRoot) return;

            contentRoot.matrix.identity();
            contentRoot.matrixWorldNeedsUpdate = true;
            contentRoot.updateMatrixWorld(true);
        }

        function setContentRootMatrix(matrix) {
            if (!contentRoot) return;

            contentRoot.matrix.copy(matrix);
            contentRoot.matrixWorldNeedsUpdate = true;
            contentRoot.updateMatrixWorld(true);
        }

        function resetAnchorPoseFilter() {
            filteredAnchorPosition.set(0, 0, 0);
            filteredAnchorQuaternion.identity();
            filteredAnchorScale.set(1, 1, 1);
            hasFilteredAnchorPose = false;

            anchorJumpCandidatePosition.set(0, 0, 0);
            anchorJumpCandidateQuaternion.identity();
            hasAnchorJumpCandidate = false;
            anchorJumpCandidateFrames = 0;
            anchorTrackingHoldFrames = 0;
        }

        function clearAnchorJumpCandidate() {
            hasAnchorJumpCandidate = false;
            anchorJumpCandidateFrames = 0;
        }

        function composeFilteredAnchorMatrix(target = new THREE.Matrix4()) {
            return target.compose(
                filteredAnchorPosition,
                filteredAnchorQuaternion,
                filteredAnchorScale
            );
        }

        function setFilteredAnchorPoseFromMatrix(matrix) {
            matrix.decompose(
                filteredAnchorPosition,
                filteredAnchorQuaternion,
                filteredAnchorScale
            );

            filteredAnchorQuaternion.normalize();
            filteredAnchorScale.set(1, 1, 1);
            hasFilteredAnchorPose = true;

            const filteredMatrix = composeFilteredAnchorMatrix();
            setContentRootMatrix(filteredMatrix);
            lastValidContentRootMatrix.copy(filteredMatrix);
            hasLastValidContentRootMatrix = true;
        }

        function finalizeSpatialLock() {
            if (!contentRoot || spatialLockFinalized) return;

            // 기준점·발끝·거리선은 contentRoot 로컬 좌표로 이미 저장됐다.
            // 이 시점부터 해당 로컬 좌표는 변경하지 않지만, 실제 공간과의
            // 연결을 유지하기 위해 Anchor 자체는 세션 종료까지 보존한다.
            spatialLockFinalized = true;
            isAnimatingLine = false;

            if (lineMesh && wallFloorMesh && toeMesh) {
                lineProgress = 1;
                lineMesh.geometry.setPositions([
                    wallFloorMesh.position.x,
                    wallFloorMesh.position.y,
                    wallFloorMesh.position.z,
                    toeMesh.position.x,
                    toeMesh.position.y,
                    toeMesh.position.z
                ]);
                lineMesh.computeLineDistances();
            }

            console.info(
                worldAnchor
                    ? '[AR] 2단계 완료: 로컬 측정 좌표를 고정하고 Anchor 추적을 유지합니다.'
                    : '[AR] 2단계 완료: 로컬 측정 좌표를 고정하고 reference-space 폴백을 유지합니다.'
            );
        }

        function getContentRootWorldInverse() {
            if (!contentRoot) {
                return new THREE.Matrix4();
            }

            contentRoot.updateMatrixWorld(true);
            return new THREE.Matrix4().copy(contentRoot.matrixWorld).invert();
        }

        function referencePositionToContentLocal(referencePosition) {
            return referencePosition.clone().applyMatrix4(
                getContentRootWorldInverse()
            );
        }

        function createWallFloorMarker(localPosition) {
            if (wallFloorMesh) return;

            const geometry = new THREE.SphereGeometry(0.02, 24, 24);
            const material = new THREE.MeshBasicMaterial({
                color: 0x00d4ff,
                depthTest: false
            });

            wallFloorMesh = new THREE.Mesh(geometry, material);
            wallFloorMesh.position.copy(localPosition);
            wallFloorMesh.scale.setScalar(0);
            wallFloorMesh.renderOrder = 100;
            contentRoot.add(wallFloorMesh);

            actionBtn.disabled = false;
            actionBtn.style.opacity = '1';
            resultMessageLockUntil = 0;
            resultEl.textContent = anchorState === 'active'
                ? '벽/바닥 기준점을 실제 공간에 고정했습니다!'
                : '벽/바닥 기준점을 등록했습니다. Anchor 미지원 환경에서는 좌표 재설정을 자동 보정합니다.';
            setStep('toe');
        }

        function releaseWorldAnchor() {
            if (worldAnchor) {
                try {
                    worldAnchor.delete();
                } catch (error) {
                    console.warn('[AR] Anchor 해제 실패:', error);
                }
            }

            worldAnchor = null;
            resetAnchorPoseFilter();
        }

        function beginWallFloorAnchorCreation(hitResult, hitMatrix) {
            if (!pendingWallFloorSelection || step !== 'wallFloor') return;

            pendingWallFloorSelection = false;
            pendingWallFloorWorldMatrix = hitMatrix.clone();
            currentHitMatrix = null;

            const requestToken = ++anchorRequestToken;
            const canCreateAnchor =
                anchorFeatureEnabled &&
                typeof hitResult?.createAnchor === 'function';

            if (!canCreateAnchor) {
                finalizeWallFloorWithoutAnchor(
                    pendingWallFloorWorldMatrix,
                    'Anchor API를 사용할 수 없음'
                );
                return;
            }

            anchorState = 'creating';
            anchorAwaitingPoseFrames = 0;

            let anchorPromise;

            try {
                // 반드시 현재 활성 XRFrame에 속한 hit-test 결과에서 호출한다.
                anchorPromise = hitResult.createAnchor();
            } catch (error) {
                console.warn('[AR] Anchor 생성 호출 실패, 폴백 사용:', error);
                finalizeWallFloorWithoutAnchor(
                    pendingWallFloorWorldMatrix,
                    error?.message || 'Anchor 생성 호출 실패'
                );
                return;
            }

            window.setTimeout(() => {
                if (
                    requestToken === anchorRequestToken &&
                    anchorState === 'creating' &&
                    pendingWallFloorWorldMatrix
                ) {
                    console.warn('[AR] Anchor 생성 응답 시간 초과, 폴백으로 전환합니다.');
                    finalizeWallFloorWithoutAnchor(
                        pendingWallFloorWorldMatrix,
                        'Anchor 생성 응답 시간 초과'
                    );
                }
            }, ANCHOR_CREATION_TIMEOUT_MS);

            Promise.resolve(anchorPromise)
                .then((anchor) => {
                    const isStale =
                        requestToken !== anchorRequestToken ||
                        !renderer?.xr?.isPresenting ||
                        step !== 'wallFloor';

                    if (isStale) {
                        try {
                            anchor.delete();
                        } catch (error) {
                            console.warn('[AR] 사용하지 않는 Anchor 해제 실패:', error);
                        }
                        return;
                    }

                    worldAnchor = anchor;
                    anchorState = 'awaiting-pose';
                    anchorAwaitingPoseFrames = 0;
                    console.info('[AR] Anchor 생성 완료, 첫 pose를 기다립니다.');
                })
                .catch((error) => {
                    if (requestToken !== anchorRequestToken) return;

                    console.warn('[AR] Anchor 생성 실패, reset 보정 폴백 사용:', error);
                    finalizeWallFloorWithoutAnchor(
                        pendingWallFloorWorldMatrix,
                        error?.message || 'Anchor 생성 실패'
                    );
                });
        }

        function finalizeWallFloorWithoutAnchor(hitMatrix, reason) {
            if (!hitMatrix || step !== 'wallFloor') return;

            anchorRequestToken++;
            releaseWorldAnchor();
            anchorState = 'fallback';
            anchorFeatureEnabled = false;
            anchorAwaitingPoseFrames = 0;
            anchorPoseMissingFrames = 0;

            const referencePosition = new THREE.Vector3()
                .setFromMatrixPosition(hitMatrix);
            const localPosition = referencePositionToContentLocal(referencePosition);

            console.info('[AR] Anchor 폴백 활성화:', reason);
            createWallFloorMarker(localPosition);
            pendingWallFloorWorldMatrix = null;
        }

        function applyFilteredAnchorPoseToward(
            targetPosition,
            targetQuaternion,
            positionSmoothing = ANCHOR_POSITION_SMOOTHING,
            rotationSmoothing = ANCHOR_ROTATION_SMOOTHING
        ) {
            const positionDistance = filteredAnchorPosition.distanceTo(targetPosition);

            if (positionDistance > ANCHOR_POSITION_DEADBAND_M) {
                const positionFactor = Math.min(
                    positionSmoothing,
                    ANCHOR_MAX_POSITION_STEP_M / Math.max(positionDistance, 0.000001)
                );
                filteredAnchorPosition.lerp(targetPosition, positionFactor);
            }

            const rotationAngle = filteredAnchorQuaternion.angleTo(targetQuaternion);

            if (rotationAngle > ANCHOR_ROTATION_DEADBAND_RAD) {
                const rotationFactor = Math.min(
                    rotationSmoothing,
                    ANCHOR_MAX_ROTATION_STEP_RAD / Math.max(rotationAngle, 0.000001)
                );
                filteredAnchorQuaternion.slerp(targetQuaternion, rotationFactor);
                filteredAnchorQuaternion.normalize();
            }

            const filteredMatrix = composeFilteredAnchorMatrix();
            setContentRootMatrix(filteredMatrix);
            lastValidContentRootMatrix.copy(filteredMatrix);
            hasLastValidContentRootMatrix = true;
        }

        function holdLastAnchorPose() {
            anchorTrackingHoldFrames++;

            if (hasFilteredAnchorPose) {
                setContentRootMatrix(composeFilteredAnchorMatrix());
            } else if (hasLastValidContentRootMatrix) {
                setContentRootMatrix(lastValidContentRootMatrix);
            }

            if (
                anchorTrackingHoldFrames === ANCHOR_TRACKING_HOLD_WARNING_FRAMES &&
                performance.now() >= resultMessageLockUntil
            ) {
                resultEl.innerHTML =
                    savedDistanceText +
                    '<br><span style="color:#ffcc00;">공간 추적이 잠시 불안정해 마지막 정상 위치를 유지하고 있습니다. 주변을 천천히 다시 비춰 주세요.</span>';
                resultMessageLockUntil = performance.now() + 2500;
            }
        }

        function updateAnchorTracking(frame) {
            if (!contentRoot || !renderer?.xr?.isPresenting || !worldAnchor) return;

            const referenceSpace = renderer.xr.getReferenceSpace();
            if (!referenceSpace) return;

            // viewer pose가 없거나 추정 위치를 사용 중일 때는 Anchor의
            // 급격한 보정을 받아들이지 않고 마지막 정상 위치를 유지한다.
            if (!currentViewerPoseAvailable || currentViewerPoseEmulated) {
                if (anchorState === 'awaiting-pose') {
                    anchorAwaitingPoseFrames++;

                    if (anchorAwaitingPoseFrames >= ANCHOR_AWAITING_POSE_LIMIT_FRAMES) {
                        console.warn('[AR] 추적 불안정으로 Anchor 첫 pose를 받지 못해 폴백으로 전환합니다.');
                        finalizeWallFloorWithoutAnchor(
                            pendingWallFloorWorldMatrix,
                            'Anchor 첫 pose 추적 시간 초과'
                        );
                        return;
                    }
                }

                holdLastAnchorPose();
                return;
            }

            let anchorPose = null;

            try {
                anchorPose = frame.getPose(worldAnchor.anchorSpace, referenceSpace);
            } catch (error) {
                console.warn('[AR] Anchor pose 조회 실패:', error);
            }

            if (!anchorPose) {
                anchorPoseMissingFrames++;
                holdLastAnchorPose();

                if (anchorState === 'awaiting-pose') {
                    anchorAwaitingPoseFrames++;

                    if (anchorAwaitingPoseFrames >= ANCHOR_AWAITING_POSE_LIMIT_FRAMES) {
                        console.warn('[AR] Anchor pose 대기 시간 초과, 폴백으로 전환합니다.');
                        finalizeWallFloorWithoutAnchor(
                            pendingWallFloorWorldMatrix,
                            'Anchor pose 대기 시간 초과'
                        );
                    }
                    return;
                }

                if (
                    anchorState === 'active' &&
                    anchorPoseMissingFrames === ANCHOR_MISSING_WARNING_FRAMES
                ) {
                    console.warn('[AR] Anchor pose가 일시적으로 누락되어 마지막 위치를 유지합니다.');
                }
                return;
            }

            anchorTrackingHoldFrames = 0;
            anchorPoseMissingFrames = 0;
            anchorAwaitingPoseFrames = 0;

            const rawAnchorMatrix = new THREE.Matrix4()
                .fromArray(anchorPose.transform.matrix);
            const rawPosition = new THREE.Vector3();
            const rawQuaternion = new THREE.Quaternion();
            const rawScale = new THREE.Vector3();
            rawAnchorMatrix.decompose(rawPosition, rawQuaternion, rawScale);
            rawQuaternion.normalize();

            if (!hasFilteredAnchorPose) {
                setFilteredAnchorPoseFromMatrix(rawAnchorMatrix);
                clearAnchorJumpCandidate();

                if (anchorState === 'awaiting-pose' || anchorState === 'creating') {
                    anchorState = 'active';
                    pendingWallFloorWorldMatrix = null;

                    // Anchor는 1단계 hit pose에 생성했으므로 기준점은 로컬 원점이다.
                    createWallFloorMarker(new THREE.Vector3(0, 0, 0));
                }
                return;
            }

            const positionDelta = filteredAnchorPosition.distanceTo(rawPosition);
            const rotationDelta = filteredAnchorQuaternion.angleTo(rawQuaternion);

            if (
                positionDelta <= ANCHOR_POSITION_DEADBAND_M &&
                rotationDelta <= ANCHOR_ROTATION_DEADBAND_RAD
            ) {
                clearAnchorJumpCandidate();
                setContentRootMatrix(composeFilteredAnchorMatrix());
                return;
            }

            const isLargeJump =
                positionDelta >= ANCHOR_LARGE_JUMP_POSITION_M ||
                rotationDelta >= ANCHOR_LARGE_JUMP_ROTATION_RAD;

            if (isLargeJump) {
                const candidateMatches =
                    hasAnchorJumpCandidate &&
                    anchorJumpCandidatePosition.distanceTo(rawPosition) <=
                    ANCHOR_JUMP_POSITION_TOLERANCE_M &&
                    anchorJumpCandidateQuaternion.angleTo(rawQuaternion) <=
                    ANCHOR_JUMP_ROTATION_TOLERANCE_RAD;

                if (!candidateMatches) {
                    anchorJumpCandidatePosition.copy(rawPosition);
                    anchorJumpCandidateQuaternion.copy(rawQuaternion);
                    hasAnchorJumpCandidate = true;
                    anchorJumpCandidateFrames = 1;
                } else {
                    anchorJumpCandidatePosition.lerp(rawPosition, 0.25);
                    anchorJumpCandidateQuaternion.slerp(rawQuaternion, 0.25);
                    anchorJumpCandidateQuaternion.normalize();
                    anchorJumpCandidateFrames++;
                }

                if (anchorJumpCandidateFrames < ANCHOR_JUMP_CONFIRM_FRAMES) {
                    // 한두 프레임의 순간이동은 무시한다.
                    setContentRootMatrix(composeFilteredAnchorMatrix());
                    return;
                }

                // 같은 큰 보정이 여러 프레임 유지되면 실제 재로컬라이징으로
                // 판단하되, 화면에서 튀지 않도록 제한된 속도로 따라간다.
                applyFilteredAnchorPoseToward(
                    anchorJumpCandidatePosition,
                    anchorJumpCandidateQuaternion,
                    0.10,
                    0.09
                );

                const remainingPosition = filteredAnchorPosition.distanceTo(
                    anchorJumpCandidatePosition
                );
                const remainingRotation = filteredAnchorQuaternion.angleTo(
                    anchorJumpCandidateQuaternion
                );

                if (
                    remainingPosition <= ANCHOR_POSITION_DEADBAND_M &&
                    remainingRotation <= ANCHOR_ROTATION_DEADBAND_RAD
                ) {
                    clearAnchorJumpCandidate();
                }
                return;
            }

            clearAnchorJumpCandidate();
            applyFilteredAnchorPoseToward(rawPosition, rawQuaternion);
        }

        function ensureReferenceSpaceListener() {
            if (!renderer?.xr?.isPresenting) return;

            const referenceSpace = renderer.xr.getReferenceSpace();
            if (!referenceSpace || referenceSpace === trackedReferenceSpace) return;

            detachReferenceSpaceListener();

            trackedReferenceSpace = referenceSpace;
            referenceSpaceResetHandler = handleReferenceSpaceReset;
            trackedReferenceSpace.addEventListener(
                'reset',
                referenceSpaceResetHandler
            );

            console.info('[AR] XRReferenceSpace reset 감지를 시작합니다.');
        }

        function detachReferenceSpaceListener() {
            if (trackedReferenceSpace && referenceSpaceResetHandler) {
                trackedReferenceSpace.removeEventListener(
                    'reset',
                    referenceSpaceResetHandler
                );
            }

            trackedReferenceSpace = null;
            referenceSpaceResetHandler = null;
        }

        function applyReferenceSpaceCorrectionToAnchorFilter(correctionMatrix) {
            if (hasFilteredAnchorPose) {
                const filteredMatrix = composeFilteredAnchorMatrix();
                filteredMatrix.premultiply(correctionMatrix);
                filteredMatrix.decompose(
                    filteredAnchorPosition,
                    filteredAnchorQuaternion,
                    filteredAnchorScale
                );
                filteredAnchorQuaternion.normalize();
                filteredAnchorScale.set(1, 1, 1);
                setContentRootMatrix(composeFilteredAnchorMatrix());
            } else if (contentRoot) {
                contentRoot.matrix.premultiply(correctionMatrix);
                contentRoot.matrixWorldNeedsUpdate = true;
                contentRoot.updateMatrixWorld(true);
            }

            if (hasLastValidContentRootMatrix) {
                lastValidContentRootMatrix.premultiply(correctionMatrix);
            }

            if (hasAnchorJumpCandidate) {
                const candidateMatrix = new THREE.Matrix4().compose(
                    anchorJumpCandidatePosition,
                    anchorJumpCandidateQuaternion,
                    new THREE.Vector3(1, 1, 1)
                );
                const candidateScale = new THREE.Vector3();
                candidateMatrix.premultiply(correctionMatrix);
                candidateMatrix.decompose(
                    anchorJumpCandidatePosition,
                    anchorJumpCandidateQuaternion,
                    candidateScale
                );
                anchorJumpCandidateQuaternion.normalize();
            }
        }

        function handleReferenceSpaceReset(event) {
            currentHitMatrix = null;
            clearAnchorJumpCandidate();

            if (!event.transform) {
                console.warn('[AR] 좌표계 reset 발생: 보정 transform 없음');

                if (!worldAnchor) {
                    resultEl.innerHTML = `
                        <span style="color:#ffcc00; font-weight:800;">
                            공간 좌표가 크게 재설정되었습니다.
                        </span><br>
                        <span style="font-size:0.95em;">
                            정확한 배치를 위해 초기화 후 다시 측정해 주세요.
                        </span>
                    `;
                    resultMessageLockUntil = performance.now() + 5000;
                }
                return;
            }

            // 기존 콘텐츠와 필터 상태를 새 reference space 좌표로 변환한다.
            // Anchor는 삭제하지 않으며, 다음 정상 pose부터 같은 필터를 계속 사용한다.
            const correctionMatrix = new THREE.Matrix4()
                .fromArray(event.transform.inverse.matrix);

            applyReferenceSpaceCorrectionToAnchorFilter(correctionMatrix);

            if (pendingWallFloorWorldMatrix) {
                pendingWallFloorWorldMatrix.premultiply(correctionMatrix);
            }
