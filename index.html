<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>AR로 벽에 걸어보기</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }

        canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #top-panel {
            padding: 20px;
            padding-top: calc(10px + env(safe-area-inset-top, 0));
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0));
        }

        #top-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        #step-title {
            font-size: 18px;
            font-weight: 800;
            color: #00ff66;
            margin-bottom: 5px;
        }

        #product-name {
            max-width: 72vw;
            margin-top: 4px;
            font-size: 12px;
            line-height: 1.4;
            opacity: 0.8;
            word-break: keep-all;
        }

        .ar-product-artist {
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.75;
            font-weight: 500;
        }

        .ar-product-title {
            margin-top: 2px;
            font-size: 14px;
            line-height: 1.35;
            opacity: 0.95;
            font-weight: 800;
        }

        .ar-product-size {
            margin-top: 4px;
            font-size: 12px;
            line-height: 1.35;
            opacity: 0.7;
            font-weight: 600;
        }

        #guide-text {
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.4;
            opacity: 0.9;
            word-break: keep-all;
        }

        #close-btn {
            flex: 0 0 auto;
            width: auto;
            min-width: 58px;
            padding: 9px 11px;
            border: 0;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            background: rgba(255, 255, 255, 0.18);
            pointer-events: auto;
        }

        #bottom-panel {
            padding: 15px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom, 0));
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            pointer-events: auto;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: 0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            background: #007aff;
            cursor: pointer;
        }

        button.danger {
            background: #991b1b;
            flex: 0.4;
        }

        button:active {
            transform: scale(0.98);
        }

        #result {
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            font-size: 15px;
            line-height: 1.5;
            text-align: center;
            word-break: keep-all;
        }

        #crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 30px;
            height: 30px;
            transform: translate(-50%, -50%);
            z-index: 5;
            pointer-events: none;
            border: 2px solid #00ff66;
            border-radius: 50%;
            display: none;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: #00ff66;
        }

        #crosshair::before {
            top: 50%;
            left: -5px;
            right: -5px;
            height: 2px;
            transform: translateY(-50%);
        }

        #crosshair::after {
            left: 50%;
            top: -5px;
            bottom: -5px;
            width: 2px;
            transform: translateX(-50%);
        }

        #ARButton {
            position: fixed !important;
            bottom: 50% !important;
            left: 50% !important;
            transform: translate(-50%, 50%) !important;
            z-index: 100 !important;

            width: min(52vw, 230px) !important;
            height: 44px !important;
            padding: 0 16px !important;

            border: 0 !important;
            border-radius: 999px !important;

            background: #ffe600 !important;
            color: #111 !important;

            font-size: 16px !important;
            font-weight: 900 !important;
            letter-spacing: -0.02em !important;

            box-shadow: 0 5px 16px rgba(0, 0, 0, 0.34) !important;
            opacity: 1 !important;

            display: flex !important;
            align-items: center !important;
            justify-content: center !important;

            cursor: pointer !important;
            -webkit-tap-highlight-color: transparent !important;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease !important;
        }

        #ARButton:active {
            transform: translate(-50%, 50%) scale(0.97) !important;
            background: #ffd400 !important;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.42) !important;
            opacity: 1 !important;
        }

        #unsupported-message {
            position: fixed;
            inset: 0;
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: #000;
            text-align: center;
        }

        #unsupported-message .box {
            max-width: 340px;
            padding: 24px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.08);
        }

        #unsupported-message h1 {
            margin: 0 0 12px;
            font-size: 20px;
        }

        #unsupported-message p {
            margin: 0;
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.85;
            word-break: keep-all;
        }
    </style>
