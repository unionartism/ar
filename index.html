<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>기울기 기반 거리 측정기</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; color: #fff; }
        #camera-preview { width: 100vw; height: 100vh; object-fit: cover; position: absolute; z-index: 1; }
        #ui-layer { position: absolute; z-index: 2; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 20px; height: 20px; border: 2px solid #00ff00; border-radius: 50%; pointer-events: none; }
        #crosshair::after { content: ''; position: absolute; top: 9px; left: -5px; width: 30px; height: 2px; background: #00ff00; }
        #crosshair::before { content: ''; position: absolute; top: -5px; left: 9px; width: 2px; height: 30px; background: #00ff00; }
        .hud { background: rgba(0,0,0,0.7); padding: 15px; margin: 10px; border-radius: 8px; pointer-events: auto; }
        button { background: #007aff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:active { background: #0051a8; }
    </style>
</head>
<body>

    <!-- 카메라 백그라운드 영상 -->
    <video id="camera-preview" autoplay playsinline muted></video>

    <!-- 조준점 (Crosshair) -->
    <div id="crosshair"></div>

    <!-- UI 레이어 -->
    <div id="ui-layer">
        <div class="hud" id="status-panel">
            <h3>기울기 측정 가이드</h3>
            <label>스마트폰 높이(cm): </label>
            <input type="number" id="cam-height" value="150" style="width: 60px; text-align: center;"><br><br>
            <div id="current-angle">현재 Pitch 각도: 0°</div>
            <div id="calc-result" style="color: #00ff00; font-weight: bold; margin-top: 5px;">결과: -</div>
        </div>

        <div class="hud" style="text-align: center; margin-bottom: 30px;">
            <button id="btn-action">센서 권한 요청</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('camera-preview');
        const btnAction = document.getElementById('btn-action');
        const txtAngle = document.getElementById('current-angle');
        const txtResult = document.getElementById('calc-result');
        const inputHeight = document.getElementById('cam-height');

        let currentPitch = 0; // 스마트폰의 상하 기울기 (Degree)
        let step = 0;         // 0: 권한요청, 1: 벽면조준, 2: 발끝조준, 3: 완료
        let d_wall = 0;       // 벽까지의 수평 거리
        let d_feet = 0;       // 발끝까지의 수평 거리

        // 1. 카메라 스트림 켜기
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert('카메라 접근 권한이 필요합니다: ' + err));

        // 2. iOS 센서 권한 대응 및 스텝별 트리거
        btnAction.addEventListener('click', async () => {
            if (step === 0) {
                // iOS 13+ 권한 요청 처리
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceOrientationEvent.requestPermission();
                        if (permissionState === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                            initStep1();
                        } else {
                            alert('센서 권한이 거부되었습니다.');
                        }
                    } catch (error) {
                        alert('센서 요청 중 오류 발생: ' + error);
                    }
                } else {
                    // Android 및 일반 브라우저
                    window.addEventListener('deviceorientation', handleOrientation);
                    initStep1();
                }
            } else if (step === 1) {
                // [점 1] 벽면 하단 측정
                const h = parseFloat(inputHeight.value);
                // 삼각함수 공식: d = h * tan(θ)
                // 기울기 각도를 라디안으로 변환 (정면이 0도 기준이 되도록 보정 필요)
                const thetaRad = (90 - currentPitch) * (Math.PI / 180);
                d_wall = h * Math.tan(thetaRad);

                step = 2;
                btnAction.innerText = "2단계: 발끝 조준 후 터치";
                txtResult.innerText = `벽면 거리 계산됨: ${Math.round(d_wall)} cm`;
            } else if (step === 2) {
                // [점 2] 사용자 발끝 측정
                const h = parseFloat(inputHeight.value);
                const thetaRad = (90 - currentPitch) * (Math.PI / 180);
                d_feet = h * Math.tan(thetaRad);

                const finalDistance = d_wall - d_feet;

                step = 1; // 다시 측정할 수 있도록 1단계로 순환
                btnAction.innerText = "1단계: 벽면 바닥 조준 후 터치";
                txtResult.innerHTML = `
                    벽면까지: ${Math.round(d_wall)}cm<br>
                    발끝까지: ${Math.round(d_feet)}cm<br>
                    <span style="font-size:1.2em; color:#ffff00;">★ 실제 측정 거리: ${Math.round(Math.abs(finalDistance))} cm</span>
                `;
            }
        });

        function initStep1() {
            step = 1;
            btnAction.innerText = "1단계: 벽면 바닥 조준 후 터치";
        }

        // 3. 자이로스코프 센서 데이터 처리 (Pitch 추출)
        function handleOrientation(event) {
            // event.beta: 스마트폰을 세웠을 때 앞뒤로 기울어지는 각도 (-180 ~ 180)
            // 기종 및 파지법에 따라 정면을 바라볼 때 보통 70~90도 사이를 가집니다.
            if (event.beta !== null) {
                currentPitch = event.beta;
                txtAngle.innerText = `현재 Pitch 각도: ${Math.round(currentPitch)}°`;
            }
        }
    </script>
</body>
</html>
