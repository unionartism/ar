<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wall Distance MVP</title>
  <style>
    html, body { margin:0; height:100%; overflow:hidden; background:#000; color:#fff; font-family:system-ui,-apple-system,sans-serif; }
    #app { position:fixed; inset:0; background:#000; }
    video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; background:#111; }
    #img { position:absolute; display:none; max-width:none; transform-origin:center; pointer-events:none; box-shadow:0 2px 12px rgba(0,0,0,.35); }
    .cross { position:absolute; left:50%; top:50%; width:54px; height:54px; transform:translate(-50%,-50%); pointer-events:none; }
    .cross:before, .cross:after { content:""; position:absolute; background:#fff; box-shadow:0 0 4px #000; }
    .cross:before { left:26px; top:0; width:2px; height:54px; }
    .cross:after { left:0; top:26px; width:54px; height:2px; }
    .panel { position:absolute; left:8px; right:8px; bottom:calc(8px + env(safe-area-inset-bottom)); padding:10px; border-radius:12px; background:rgba(0,0,0,.72); font-size:13px; }
    .row { display:flex; gap:6px; align-items:center; margin-top:7px; flex-wrap:wrap; }
    .row:first-child { margin-top:0; }
    button, label { border:0; border-radius:8px; padding:8px 9px; background:#fff; color:#111; font-weight:700; font-size:13px; }
    input { border:0; border-radius:8px; padding:7px; font-size:13px; }
    input[type="number"] { width:72px; }
    input[type="range"] { flex:1; min-width:120px; padding:0; }
    input[type="file"] { display:none; }
    .muted { color:rgba(255,255,255,.75); }
    .ok { color:#a7ffb5; }
    .warn { color:#ffd48a; }
    #status { line-height:1.35; }
  </style>
</head>
<body>
<div id="app">
  <video id="video" autoplay muted playsinline></video>
  <img id="img" alt="배치 이미지" />
  <div class="cross"></div>

  <div class="panel">
    <div id="status" class="muted">1) 카메라 시작 → 2) 수평 기준 저장 → 3) 벽/바닥선 측정</div>

    <div class="row">
      <button id="startBtn">카메라 시작</button>
      <button id="zeroBtn">수평 기준 저장</button>
      <button id="measureBtn">벽/바닥선 측정</button>
    </div>

    <div class="row">
      <span>카메라높이 cm</span>
      <input id="cameraHeight" type="number" value="155" min="80" max="220" />
      <span>거리 m</span>
      <input id="distance" type="number" value="2.00" min="0.2" max="20" step="0.01" />
    </div>

    <div class="row">
      <label for="file">이미지 선택</label>
      <input id="file" type="file" accept="image/*" />
      <button id="placeBtn">이미지 배치</button>
      <span>실제폭 cm</span>
      <input id="realWidth" type="number" value="100" min="5" max="500" />
    </div>

    <div class="row">
      <span>크기</span>
      <input id="scale" type="range" min="0.3" max="2.5" step="0.01" value="1" />
    </div>

    <div id="debug" class="muted">센서 대기 중</div>
  </div>
</div>

<script>
  const video = document.getElementById('video');
  const img = document.getElementById('img');
  const statusEl = document.getElementById('status');
  const debugEl = document.getElementById('debug');

  const startBtn = document.getElementById('startBtn');
  const zeroBtn = document.getElementById('zeroBtn');
  const measureBtn = document.getElementById('measureBtn');
  const placeBtn = document.getElementById('placeBtn');
  const file = document.getElementById('file');
  const cameraHeight = document.getElementById('cameraHeight');
  const distance = document.getElementById('distance');
  const realWidth = document.getElementById('realWidth');
  const scale = document.getElementById('scale');

  const H_FOV_DEG = 65; // 모바일 후면카메라 대략값. MVP라서 보정 전제.

  let ori = { alpha:null, beta:null, gamma:null };
  let zeroBeta = null;
  let zeroAlpha = null;
  let imageAspect = 1;
  let hasImage = false;
  let placement = null;

  function setStatus(text, cls='muted') {
    statusEl.className = cls;
    statusEl.textContent = text;
  }

  function rad(deg) { return deg * Math.PI / 180; }
  function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
  function angleDiff(a, b) {
    if (a == null || b == null) return 0;
    let d = a - b;
    while (d > 180) d -= 360;
    while (d < -180) d += 360;
    return d;
  }

  async function start() {
    try {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('이 브라우저는 카메라 API를 지원하지 않습니다.', 'warn');
        return;
      }

      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal:'environment' } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();

      await requestSensor();
      setStatus('카메라 준비 완료. 먼저 카메라를 벽 눈높이에 정면으로 비추고 “수평 기준 저장”을 누르세요.', 'ok');
    } catch (e) {
      console.error(e);
      setStatus('카메라 권한 또는 HTTPS 환경을 확인하세요. iPhone은 Safari에서 테스트하세요.', 'warn');
    }
  }

  async function requestSensor() {
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      const res = await DeviceOrientationEvent.requestPermission();
      if (res !== 'granted') {
        setStatus('센서 권한이 거부되었습니다. 거리값은 직접 입력해야 합니다.', 'warn');
        return;
      }
    }

    window.addEventListener('deviceorientation', (e) => {
      ori = { alpha:e.alpha, beta:e.beta, gamma:e.gamma };
      const beta = e.beta == null ? '-' : e.beta.toFixed(1);
      const gamma = e.gamma == null ? '-' : e.gamma.toFixed(1);
      const zero = zeroBeta == null ? '-' : zeroBeta.toFixed(1);
      const delta = zeroBeta == null || e.beta == null ? '-' : Math.abs(angleDiff(e.beta, zeroBeta)).toFixed(1);
      debugEl.textContent = `beta ${beta}° / gamma ${gamma}° / 기준 ${zero}° / 차이 ${delta}°`;
    }, true);
  }

  function saveHorizontalZero() {
    if (ori.beta == null) {
      setStatus('센서값이 아직 없습니다. 카메라 시작 후 1~2초 뒤 다시 눌러보세요.', 'warn');
      return;
    }
    zeroBeta = ori.beta;
    zeroAlpha = ori.alpha;
    setStatus('수평 기준 저장 완료. 이제 벽과 바닥이 만나는 선을 중앙 십자에 맞추고 “벽/바닥선 측정”을 누르세요.', 'ok');
  }

  function measure() {
    if (zeroBeta == null) {
      setStatus('먼저 벽 눈높이를 정면으로 비춘 상태에서 “수평 기준 저장”을 눌러야 합니다.', 'warn');
      return;
    }
    if (ori.beta == null) {
      setStatus('센서값이 없습니다. 거리 m 값을 직접 입력해 주세요.', 'warn');
      return;
    }

    const deltaDeg = Math.abs(angleDiff(ori.beta, zeroBeta));
    if (deltaDeg < 3) {
      setStatus('기울기 차이가 너무 작습니다. 벽/바닥선이 중앙에 오도록 폰을 더 아래로 기울여 주세요.', 'warn');
      return;
    }
    if (deltaDeg > 80) {
      setStatus('기울기가 너무 큽니다. 측정 자세를 다시 잡아 주세요.', 'warn');
      return;
    }

    const h = Number(cameraHeight.value) / 100;
    const d = h / Math.tan(rad(deltaDeg));
    const result = clamp(d, 0.2, 20);
    distance.value = result.toFixed(2);
    setStatus(`거리 측정값: 약 ${result.toFixed(2)}m. 이제 벽 눈높이에 십자를 맞추고 이미지를 배치하세요.`, 'ok');
    updateImage();
  }

  function metersToPixels(widthM, distM) {
    const visibleWidthM = 2 * distM * Math.tan(rad(H_FOV_DEG) / 2);
    return window.innerWidth * (widthM / visibleWidthM);
  }

  function placeImage() {
    if (!hasImage) {
      setStatus('먼저 이미지를 선택하세요.', 'warn');
      return;
    }
    placement = {
      alpha: ori.alpha,
      beta: ori.beta,
      x: window.innerWidth / 2,
      y: window.innerHeight / 2
    };
    img.style.display = 'block';
    updateImage();
    setStatus('이미지 배치 완료. 거리/실제폭/크기를 조절해 보세요.', 'ok');
  }

  function updateImage() {
    if (!placement || !hasImage) return;

    const distM = Math.max(0.2, Number(distance.value) || 2);
    const widthM = Math.max(0.05, Number(realWidth.value) / 100 || 1);
    const s = Number(scale.value) || 1;
    const w = metersToPixels(widthM * s, distM);
    const h = w / imageAspect;

    let x = placement.x;
    let y = placement.y;

    if (ori.alpha != null && placement.alpha != null) {
      const dx = rad(angleDiff(ori.alpha, placement.alpha));
      x = placement.x - Math.tan(dx) / Math.tan(rad(H_FOV_DEG) / 2) * window.innerWidth / 2;
    }
    if (ori.beta != null && placement.beta != null) {
      const dy = rad(angleDiff(ori.beta, placement.beta));
      x = x; // 명시적으로 유지
      y = placement.y + Math.tan(dy) / Math.tan(rad(50) / 2) * window.innerHeight / 2;
    }

    img.style.width = `${w}px`;
    img.style.height = `${h}px`;
    img.style.left = `${x}px`;
    img.style.top = `${y}px`;
    img.style.transform = 'translate(-50%, -50%)';
  }

  function loop() {
    updateImage();
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', start);
  zeroBtn.addEventListener('click', saveHorizontalZero);
  measureBtn.addEventListener('click', measure);
  placeBtn.addEventListener('click', placeImage);
  cameraHeight.addEventListener('input', updateImage);
  distance.addEventListener('input', updateImage);
  realWidth.addEventListener('input', updateImage);
  scale.addEventListener('input', updateImage);
  window.addEventListener('resize', updateImage);

  file.addEventListener('change', () => {
    const f = file.files && file.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    img.onload = () => {
      imageAspect = img.naturalWidth / img.naturalHeight;
      hasImage = true;
      setStatus('이미지 선택 완료. 거리 측정 후 벽 눈높이에 맞춰 이미지 배치를 누르세요.', 'ok');
    };
    img.src = url;
  });

  loop();
</script>
</body>
</html>
